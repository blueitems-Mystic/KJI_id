<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1100">
  <title>Kim Jong-il | Concept & Full Stack Artist Portfolio</title>

  <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <script>
    (function(){
      var t = localStorage.getItem('portfolio-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <style>
    /* === Theme Variables === */
    :root {
      /* backgrounds */
      --bg-main: #6b7280;
      --bg-deep: #f3f4f6;
      --bg-surface: #e5e7eb;
      --bg-overlay: #d1d5db;
      --bg-dark-accent: #f3f4f6;
      --stat-gauge-bg: #9ca3af;

      /* window */
      --win-bg: #ffffff;
      --win-border: #374151;
      --win-highlight: #111827;

      /* text */
      --text-primary: #1f2937;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --text-on-dark: #ffffff;

      /* accents */
      --gold: #d97706;
      --neo-mint: #059669;
      --cyber-pink: #ff00ff;

      /* terminal buttons */
      --terminal-bg: #1f2937;
      --terminal-green: #39ff14;
      --terminal-green-glow: rgba(57, 255, 20, 0.5);
      --terminal-green-bright: #66ff4d;

      /* effects */
      --shadow-color: rgba(0,0,0,0.2);
      --grid-line: rgba(0, 0, 0, 0.05);
      --scanline-bar-opacity: 0.1;
      --scanline-btn-opacity: 0.15;
      --border-strong: #111827;
    }

    [data-theme="dark"] {
      --bg-main: #0d0d0d;
      --bg-deep: #0f0f0f;
      --bg-surface: #0a0a0a;
      --bg-overlay: #000000;
      --bg-dark-accent: #222222;
      --stat-gauge-bg: #333333;

      --win-bg: #2a2a2a;
      --win-border: #4a4a4a;
      --win-highlight: #636363;

      --text-primary: #e0e0e0;
      --text-secondary: #a2a2a2;
      --text-muted: #737373;
      --text-on-dark: #ffffff;

      --gold: #ffcc00;
      --neo-mint: #00ffcc;
      --cyber-pink: #ff00ff;

      --terminal-bg: #000000;
      --terminal-green: #a2a2a2;
      --terminal-green-glow: transparent;
      --terminal-green-bright: #00ffcc;

      --shadow-color: rgba(0,0,0,0.8);
      --grid-line: rgba(0, 255, 204, 0.03);
      --scanline-bar-opacity: 0.35;
      --scanline-btn-opacity: 0.4;
      --border-strong: #ffffff;
    }

    html, body {
      min-width: 1100px;
    }
    body {
      font-family: 'Gowun Dodum', sans-serif;
      background-color: var(--bg-main);
      color: var(--text-primary);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 30px 30px;
      font-size: 1.15rem;
      line-height: 1.6;
      padding-top: 48px;
    }

    .pixel-font {
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      line-height: 1.5;
    }

    /* === Header Styling === */
    header h1.text-yellow-400 {
      color: #ffffff !important;
      text-shadow:
        1px 1px 0px rgba(0,0,0,0.4),
        2px 2px 0px rgba(0,0,0,0.15),
        0px 0px 5px rgba(255,255,255,0.1);
      letter-spacing: 2px;
    }
    header p.text-green-400 {
      color: var(--terminal-green) !important;
      text-shadow: 1px 1px 0px rgba(0,0,0,0.4);
      font-weight: bold;
      letter-spacing: 1px;
    }
    [data-theme="dark"] header h1.text-yellow-400 {
      color: var(--gold) !important;
      text-shadow: none;
      letter-spacing: normal;
    }
    [data-theme="dark"] header p.text-green-400 {
      color: var(--neo-mint) !important;
      text-shadow: none;
      font-weight: normal;
      letter-spacing: normal;
    }

    /* === Top Status Bar (RPG Style) === */
    .status-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: var(--bg-overlay);
      color: var(--text-primary);
      border-bottom: 3px solid var(--win-border);
      z-index: 10000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      font-size: 0.7rem;
    }
    .status-bar::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, var(--scanline-bar-opacity)) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
    }
    .stat-gauge {
      width: 70px;
      height: 8px;
      background: var(--stat-gauge-bg);
      border: 1px solid var(--border-strong);
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
    }
    .stat-fill { height: 100%; }

    .pwr-btn-top {
      background: #dc2626;
      color: #fff;
      border: 2px solid var(--border-strong);
      box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
      padding: 4px 8px;
      font-size: 0.6rem;
      cursor: pointer;
      margin-left: 8px;
      transition: 0.1s;
      position: relative;
      z-index: 2;
    }
    .pwr-btn-top:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px rgba(0,0,0,0.5); }
    .pwr-btn-top.off { background: var(--text-muted); color: var(--text-secondary); }
    .pwr-btn-top.theme-toggle { background: var(--win-border); color: #ffffff; }
    [data-theme="dark"] .pwr-btn-top.theme-toggle { background: #b0b0b0; color: #1a1a1a; }

    /* === OS Window Style === */
    .os-window {
      background-color: var(--win-bg);
      border: 4px solid var(--win-border);
      border-radius: 2px;
      box-shadow: 8px 8px 0px var(--shadow-color);
      transition: all 0.3s ease;
      position: relative;
      margin-bottom: 40px;
    }
    .os-window:hover {
      border-color: var(--win-highlight);
    }
    .os-header {
      background: var(--win-border);
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #000;
      transition: background 0.3s ease;
    }
    .os-window:hover .os-header {
      background: var(--win-highlight);
    }
    .os-header-title {
      font-family: 'Press Start 2P', sans-serif;
      font-size: 0.75rem;
      color: #ffffff;
      text-shadow: 1px 1px 0px #000;
      transition: color 0.3s ease;
    }
    [data-theme="dark"] .os-header-title {
      color: #b8b8b8;
    }
    .os-window:hover .os-header-title {
      color: #ffffff;
    }

    .os-header-squares { display: flex; gap: 4px; }
    .os-square { width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.4); }
    .os-square.y { background: #eab308; }
    .os-square.g { background: #22c55e; }
    .os-square.r { background: #ef4444; }

    .os-body { padding: 24px; }

    .rpg-title {
      border-bottom: 2px dashed var(--win-border);
      padding-bottom: 12px;
      margin-bottom: 20px;
      color: var(--gold);
      text-shadow: 1px 1px 0px var(--shadow-color);
    }
    /* === Terminal Style Buttons === */
    .btn-pixel {
      background-color: var(--terminal-bg);
      color: var(--terminal-green);
      text-shadow: 0 0 5px var(--terminal-green-glow);
      border: 2px solid var(--border-strong);
      padding: 12px 20px;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      box-shadow: 4px 4px 0px var(--shadow-color);
      position: relative;
      transition: all 0.15s ease;
      overflow: hidden;
    }
    .btn-pixel::after {
      content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, var(--scanline-btn-opacity)) 0px,
        rgba(0, 0, 0, var(--scanline-btn-opacity)) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none; z-index: 5;
      animation: scanlineScroll 12s linear infinite;
    }
    @keyframes scanlineScroll {
      from { background-position: 0 0; }
      to { background-position: 0 100%; }
    }
    .btn-pixel > svg {
      width: 18px; height: 18px; fill: currentColor; flex-shrink: 0;
      margin-right: 12px; position: relative; z-index: 4;
      filter: drop-shadow(0 0 3px var(--terminal-green-glow));
    }
    .btn-pixel-text { position: relative; z-index: 4; display: inline-flex; align-items: center; }
    .btn-pixel-text::before { content: ">"; color: var(--terminal-green-bright); margin-right: 8px; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .btn-pixel:hover { color: var(--terminal-green-bright); box-shadow: 2px 2px 0px var(--shadow-color); transform: translate(2px, 2px); }
    .btn-pixel:active { box-shadow: 0px 0px 0px rgba(0,0,0,1); transform: translate(4px, 4px); background-color: #111; }

    .yt-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
    .yt-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .video-card { background-color: var(--win-bg); border: 3px solid var(--win-border); box-shadow: 4px 4px 0 var(--shadow-color); overflow: hidden; transition: border-color 0.3s; }
    .video-card:hover { border-color: var(--win-highlight); }

    .text-yellow-400 { color: var(--gold) !important; font-weight: 700; }
    .text-yellow-300 { color: var(--gold) !important; font-weight: 700; }
    .text-green-400 { color: var(--neo-mint) !important; font-weight: 700; }
    .text-blue-400 { color: #1d4ed8 !important; font-weight: 700; }
    .text-blue-200 { color: #2563eb !important; font-weight: 700; }
    [data-theme="dark"] .text-yellow-300 { color: #facc15 !important; }
    [data-theme="dark"] .text-blue-400 { color: #7a8898 !important; font-weight: normal; }
    [data-theme="dark"] .text-blue-200 { color: var(--neo-mint) !important; opacity: 0.8; font-weight: normal; }
    [data-theme="dark"] .text-green-400 { font-weight: normal; }
    [data-theme="dark"] .text-yellow-400 { font-weight: normal; }

    /* Light mode: Tailwind gray overrides for readability on white bg */
    .text-gray-300 { color: #1f2937 !important; }
    .text-gray-400 { color: #4b5563 !important; }
    .text-gray-500 { color: #374151 !important; }
    .text-white { color: #111827 !important; }
    [data-theme="dark"] .text-gray-300 { color: #d1d5db !important; }
    [data-theme="dark"] .text-gray-400 { color: #9ca3af !important; }
    [data-theme="dark"] .text-gray-500 { color: #6b7280 !important; }
    [data-theme="dark"] .text-white { color: #ffffff !important; }

    /* === CRT Overlay Effect === */
    .crt-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.12) 50%),
                  linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      background-size: 100% 3px, 3px 100%;
      z-index: 9997;
      pointer-events: none;
    }
    [data-theme="dark"] .crt-overlay {
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                  linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 3px, 3px 100%;
    }

    /* === Edit Mode UI === */
    .login-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-modal-box { background: var(--win-bg); border: 3px solid var(--win-border); border-radius: 4px; padding: 24px; min-width: 320px; max-width: 90vw; color: var(--text-primary); }
    .login-modal-box .title { font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif; font-size: 0.8rem; color: var(--gold); margin-bottom: 12px; }
    .login-modal-box .error { color: #e74c3c; font-size: 0.85rem; margin-bottom: 8px; }
    .login-modal-box input[type="password"] { width: 100%; padding: 10px 12px; background: var(--bg-deep); border: 2px solid var(--win-border); color: var(--text-primary); border-radius: 2px; font-size: 1rem; outline: none; }
    .login-modal-box input[type="password"]:focus { border-color: var(--gold); }
    .login-modal-box .btns { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .login-modal-box button { font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif; font-size: 0.7rem; padding: 8px 14px; border-radius: 2px; cursor: pointer; border: 2px solid var(--win-border); }
    .login-modal-box .btn-enter { background: var(--gold); color: var(--text-on-dark); border-color: var(--gold); }
    .login-modal-box .btn-enter:hover { background: var(--win-highlight); }
    .login-modal-box .btn-cancel { background: transparent; color: var(--text-secondary); }
    .login-modal-box .btn-cancel:hover { color: var(--text-primary); border-color: var(--text-primary); }

    .publish-confirm-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .publish-confirm-box { background: var(--win-bg); border: 4px solid var(--gold); padding: 24px; max-width: 400px; font-family: 'Press Start 2P', sans-serif; color: var(--text-primary); }
    .publish-confirm-box .title { color: var(--gold); font-size: 0.9rem; margin-bottom: 16px; }
    .publish-confirm-box .message { color: var(--text-primary); font-family: 'Gowun Dodum', sans-serif; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .publish-confirm-box .btns { display: flex; gap: 12px; justify-content: flex-end; }
    .publish-confirm-box .btn-confirm { background: var(--gold); color: var(--text-on-dark); border: none; padding: 8px 16px; cursor: pointer; font-family: 'Press Start 2P', sans-serif; font-size: 0.7rem; }
    .publish-confirm-box .btn-cancel { background: transparent; color: var(--text-secondary); border: 2px solid var(--text-secondary); padding: 6px 14px; cursor: pointer; font-family: 'Press Start 2P', sans-serif; font-size: 0.7rem; }
    .publish-confirm-box .btn-cancel:hover { color: var(--text-primary); border-color: var(--text-primary); }

    .history-dropdown-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); display: flex; align-items: flex-start; justify-content: center; z-index: 9998; padding-top: 100px; }
    .history-dropdown { background: var(--win-bg); border: 4px solid var(--gold); padding: 20px; width: 360px; max-height: 70vh; overflow-y: auto; font-family: 'Press Start 2P', sans-serif; color: var(--text-primary); }
    .history-dropdown .title { color: var(--gold); font-size: 0.85rem; margin-bottom: 12px; }
    .history-dropdown .empty { color: var(--text-secondary); font-family: 'Gowun Dodum', sans-serif; padding: 12px 0; text-align: center; }
    .history-dropdown .error { color: #fca5a5; font-family: 'Gowun Dodum', sans-serif; padding: 12px 0; }
    .history-dropdown .error .retry { margin-left: 8px; background: var(--bg-dark-accent); color: var(--gold); border: 2px solid var(--gold); padding: 2px 8px; cursor: pointer; font-family: 'Press Start 2P', sans-serif; font-size: 0.6rem; }
    .history-dropdown .snapshot-list { list-style: none; padding: 0; margin: 0 0 12px; }
    .history-dropdown .snapshot-list li { margin-bottom: 4px; }
    .history-dropdown .snapshot-list button { width: 100%; background: var(--bg-deep); border: 1px solid var(--win-border); color: var(--text-primary); padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-family: 'Gowun Dodum', sans-serif; font-size: 0.85rem; }
    .history-dropdown .snapshot-list button:hover:not(:disabled) { background: var(--bg-surface); border-color: var(--gold); }
    .history-dropdown .snapshot-list .ts { font-weight: bold; }
    .history-dropdown .close { background: transparent; color: var(--text-secondary); border: 2px solid var(--text-secondary); padding: 4px 12px; cursor: pointer; font-family: 'Press Start 2P', sans-serif; font-size: 0.65rem; float: right; }

    .footer-edit-btn { background: transparent; border: none; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; padding: 2px 6px; margin-left: 8px; transition: color 0.2s; }
    .footer-edit-btn:hover { color: var(--gold); }
    @media (max-width: 767px) { .footer-edit-btn { display: none !important; } }

    .edit-mode-root { position: relative; padding-top: 56px; }
    .edit-toolbar-sticky { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: var(--bg-surface); border-bottom: 3px solid var(--gold); display: flex; align-items: center; padding: 0 16px; z-index: 10001; font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif; font-size: 0.7rem; gap: 12px; color: var(--text-primary); }
    .edit-toolbar-sticky .badge { background: #16a34a; color: #fff; padding: 4px 8px; border-radius: 2px; }
    .edit-toolbar-sticky .status { color: var(--text-secondary); flex: 1; }
    .edit-toolbar-sticky .status.dirty { color: var(--gold); }
    .edit-toolbar-sticky .status.error { color: #ef4444; }
    .edit-toolbar-sticky button { background: transparent; border: 2px solid var(--win-border); color: var(--text-primary); padding: 6px 12px; border-radius: 2px; cursor: pointer; font-family: inherit; font-size: 0.7rem; }
    .edit-toolbar-sticky .toolbar-btn { background: var(--bg-dark-accent); color: var(--gold); border: 2px solid var(--gold); padding: 4px 10px; font-family: 'Press Start 2P', sans-serif; font-size: 0.65rem; cursor: pointer; margin: 0 2px; }
    .edit-toolbar-sticky .toolbar-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .edit-toolbar-sticky .toolbar-btn:hover:not(:disabled) { background: var(--gold); color: var(--text-on-dark); }
    .edit-toolbar-sticky .unpublished-badge { background: #7f1d1d; color: #fde68a; padding: 2px 8px; font-family: 'Press Start 2P', sans-serif; font-size: 0.6rem; border: 1px solid #fde68a; margin: 0 4px; }

    .block-edit-wrap { position: relative; padding: 4px; border: 1px dashed transparent; transition: border-color 0.15s; }
    .block-edit-wrap:hover { border-color: rgba(241, 196, 15, 0.5); }
    .block-mini-toolbar { position: absolute; top: -14px; right: 8px; display: none; gap: 2px; background: var(--bg-surface); border: 1px solid var(--win-border); border-radius: 2px; padding: 2px; z-index: 10; }
    .block-edit-wrap:hover .block-mini-toolbar { display: flex; }
    .block-mini-toolbar button { background: transparent; border: none; color: var(--text-primary); font-size: 0.85rem; width: 22px; height: 22px; cursor: pointer; padding: 0; }
    .block-mini-toolbar button:hover { color: var(--gold); }
    .block-mini-toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
    .block-mini-toolbar .separator { width: 1px; background: var(--win-border); margin: 2px 2px; }

    .block-drag-handle { position: absolute; left: -18px; top: 50%; transform: translateY(-50%); display: none; color: var(--text-muted); cursor: grab; user-select: none; font-size: 1rem; padding: 4px; }
    .block-edit-wrap:hover .block-drag-handle { display: block; }
    .block-drag-handle:hover { color: var(--gold); }
    .block-edit-wrap.dragging { opacity: 0.4; }
    .block-edit-wrap.drag-over-top { border-top: 2px solid var(--gold); }
    .block-edit-wrap.drag-over-bottom { border-bottom: 2px solid var(--gold); }

    .block-insert-gap { position: relative; height: 12px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s, height 0.15s; }
    .block-insert-gap:hover { opacity: 1; height: 24px; }
    .block-insert-gap::before { content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 1px; background: rgba(241, 196, 15, 0.5); }
    .block-insert-gap button { position: relative; background: var(--bg-surface); border: 1px solid var(--gold); color: var(--gold); width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; z-index: 1; }
    .block-insert-gap button:hover { background: var(--gold); color: var(--text-on-dark); }

    .block-type-picker-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998; display: flex; align-items: center; justify-content: center; }
    .block-type-picker { background: var(--win-bg); border: 3px solid var(--win-border); border-radius: 4px; padding: 20px; min-width: 360px; }
    .block-type-picker .title { font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif; font-size: 0.8rem; color: var(--gold); margin-bottom: 12px; text-align: center; }
    .block-type-picker .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .block-type-picker .grid button { background: var(--bg-deep); border: 2px solid var(--win-border); color: var(--text-primary); padding: 14px 6px; border-radius: 2px; cursor: pointer; font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif; font-size: 0.55rem; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .block-type-picker .grid button .emoji { font-size: 1.2rem; }
    .block-type-picker .grid button:hover { border-color: var(--gold); color: var(--gold); }
    .block-type-picker .cancel { margin-top: 12px; background: transparent; border: 2px solid var(--win-border); color: var(--text-secondary); padding: 6px 12px; border-radius: 2px; cursor: pointer; width: 100%; font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif; font-size: 0.7rem; }
    .block-type-picker .cancel:hover { color: var(--gold); border-color: var(--gold); }

    .block-edit-wrap [contenteditable="true"] { outline: 1px dashed rgba(241,196,15,0.8); outline-offset: 2px; cursor: text; min-height: 1em; }
    .block-edit-wrap [contenteditable="true"]:focus { outline-color: var(--gold); }

    // --- Debounce hook ---
    function useDebouncedCallback(fn, delayMs) {
      const timerRef = React.useRef(null);
      const fnRef = React.useRef(fn);
      React.useEffect(() => { fnRef.current = fn; }, [fn]);
      const cancel = React.useCallback(() => {
        if (timerRef.current) {
          clearTimeout(timerRef.current);
          timerRef.current = null;
        }
      }, []);
      const trigger = React.useCallback((...args) => {
        cancel();
        timerRef.current = setTimeout(() => {
          timerRef.current = null;
          try {
            const ret = fnRef.current(...args);
            // fire-and-forget: doSave 의 re-throw 는 flushAndWait 용이므로 여기선 삼킴
            if (ret && typeof ret.catch === "function") ret.catch(() => {});
          } catch (_) { /* 동기 throw 도 삼킴 */ }
        }, delayMs);
      }, [cancel, delayMs]);
      const flush = React.useCallback(() => {
        if (timerRef.current) {
          cancel();
          return fnRef.current();
        }
        return undefined;
      }, [cancel]);
      React.useEffect(() => cancel, [cancel]);
      return [trigger, flush, cancel];
    }

    // past/future 는 Content[] 배열. max 30, 초과 시 shift.
    const HISTORY_MAX = 30;
    const HISTORY_DEBOUNCE_MS = 500;

    function useHistoryStack(initialContent) {
      const [present, setPresent] = React.useState(initialContent);
      // presentRef 는 최신 present 를 ref 로 유지 — state updater 밖에서 curr 값 접근용.
      // React 가 state updater 를 순수하게 요구하므로 (StrictMode 이중 실행),
      // push/undo/redo 는 updater 밖에서 먼저 ref 돌리고 그 후 setPresent(newValue) 를 호출한다.
      const presentRef = React.useRef(initialContent);
      React.useEffect(() => { presentRef.current = present; }, [present]);

      const futureRef = React.useRef([]);
      const pendingRef = React.useRef(null); // { prev, timer }

      const [canRedo, setCanRedo] = React.useState(false);
      const [hasUnpublishedChanges, setHasUnpublishedChanges] = React.useState(false);

      const recomputeFlags = React.useCallback(() => {
        setCanUndo(pastRef.current.length > 0 || pendingRef.current !== null);

      }, []);

        if (!pendingRef.current) return;
        const { prev, timer } = pendingRef.current;

        pendingRef.current = null;
      }, []);

      // push 는 prev 를 past 에 싣는다 (즉시 또는 debounce). setPresent 는 이 밖에서 호출.
      const push = React.useCallback((prev, opts) => {
        const immediate = !!(opts && opts.immediate);
        futureRef.current = []; // 새 action 은 redo 스택 초기화
        if (immediate) {
          // pending 중인 타이핑 스냅샷이 있었다면 먼저 commit
          commitPendingImmediate();
          pastRef.current.push(prev);
          if (pastRef.current.length > HISTORY_MAX) pastRef.current.shift();
        } else {
          // 이미 pending 이 있으면 "타이핑 continuation" — 기존 prev 유지, 타이머만 재설정
          if (pendingRef.current) {
            clearTimeout(pendingRef.current.timer);
            pendingRef.current.timer = setTimeout(commitPendingImmediate, HISTORY_DEBOUNCE_MS);
          } else {
            pendingRef.current = {
              prev,
              timer: setTimeout(commitPendingImmediate, HISTORY_DEBOUNCE_MS),
            };
          }
        }
        recomputeFlags();
      }, [commitPendingImmediate, recomputeFlags]);

      // setPresentAndPush: updater 밖에서 curr 을 presentRef 로 읽고, push 먼저 수행 후 setPresent.
      // 이로써 state updater 함수는 순수한 identity function 이 되어 StrictMode 이중 실행에 안전.
      const setPresentAndPush = React.useCallback((next, opts) => {
        const curr = presentRef.current;
        push(curr, opts);
        const newVal = typeof next === "function" ? next(curr) : next;
        presentRef.current = newVal; // 동기 ref 업데이트 — 동일 tick 내 후속 호출 대비
        setPresent(newVal);
      }, [push]);

      const undo = React.useCallback(() => {
        // pending 이 있으면 먼저 commit → 그 다음 past.pop()
        commitPendingImmediate();
        if (pastRef.current.length === 0) return;
        const curr = presentRef.current;
        const prev = pastRef.current.pop();
        futureRef.current.unshift(curr);
        if (futureRef.current.length > HISTORY_MAX) futureRef.current.pop();
        presentRef.current = prev;
        setPresent(prev);
        recomputeFlags();
      }, [commitPendingImmediate, recomputeFlags]);

      const redo = React.useCallback(() => {
        if (futureRef.current.length === 0) return;
        const curr = presentRef.current;
        pastRef.current.push(curr);
        if (pastRef.current.length > HISTORY_MAX) pastRef.current.shift();
        const next = futureRef.current.shift();
        presentRef.current = next;
        setPresent(next);
        recomputeFlags();
      }, [recomputeFlags]);

      const markPublished = React.useCallback(() => {
        publishedBaselineRef.current = presentRef.current;
        setHasUnpublishedChanges(false);
      }, []);

      // present 가 baseline 과 참조 다르면 "변경 있음".
      // 의도적 asymmetry: 한 번 true 가 되면 markPublished() 이전에는 false 로 돌아가지 않음.
      // Plan C spec — 사용자 혼란 최소화 위해 "publish 후 스택이 움직이면 점등, 유지" 정책.
      React.useEffect(() => {
        if (publishedBaselineRef.current !== present) {
          setHasUnpublishedChanges(true);
        }
      }, [present]);

      // 외부에서 직접 present 를 교체해야 할 때 (History restore 등)
      const replacePresent = React.useCallback((next, opts) => {
        setPresentAndPush(next, opts || { immediate: true });
      }, [setPresentAndPush]);

      // flush (beforeunload 등): pending commit 만 처리
      const flushPending = React.useCallback(() => {
        commitPendingImmediate();
      }, [commitPendingImmediate]);

      // 언마운트 시 pending 타이머 정리 — ghost timer / 스테일 closure 방지.
      React.useEffect(() => {
        return () => {
          if (pendingRef.current && pendingRef.current.timer) {
            clearTimeout(pendingRef.current.timer);
            pendingRef.current = null;
          }
        };
      }, []);

      return {
        present, setPresent: setPresentAndPush, replacePresent,
        undo, redo, canUndo, canRedo,
        hasUnpublishedChanges, markPublished,
        flushPending,
        // debug 용 (stale between renders — real-time 값은 canUndo/canRedo 참고)
        _pastLength: pastRef.current.length,
        _futureLength: futureRef.current.length,
      };
    }

    // --- Editor keyboard hook (Plan C Task 4) ---
    // Ctrl+Z / Ctrl+Shift+Z / Ctrl+Y 감지 → undo/redo. input/textarea 에서는 native 동작 유지.
    // contentEditable 영역은 커스텀 undo 우선 — 타이핑 debounce 가 pending 이면 useHistoryStack.undo
    // 가 내부적으로 먼저 flush 하므로 일관된 동작 보장.
    function useEditorKeyboard({ undo, redo, canUndo, canRedo }) {
      const handler = React.useCallback((e) => {
        const mod = e.ctrlKey || e.metaKey;
        if (!mod) return;
        const target = e.target;
        // input/textarea 에서는 브라우저 native 동작 유지 (설정 패널 필드)
        if (target && typeof target.closest === "function" && target.closest("input,textarea")) {
          return;
        }
        const key = e.key.toLowerCase();
        // preventDefault 는 canUndo/canRedo 와 무관하게 먼저 실행 — contentEditable 의
        // native undo 스택이 영향받는 것을 차단. undo()/redo() 호출만 상태 가드.
        if (key === "z" && !e.shiftKey) {
          e.preventDefault();
          e.stopPropagation();
          if (canUndo) undo();
        } else if ((key === "z" && e.shiftKey) || key === "y") {
          e.preventDefault();
          e.stopPropagation();
          if (canRedo) redo();
        }
      }, [undo, redo, canUndo, canRedo]);
      return handler;
    }

    // --- Edit content state hook (Plan C Task 3: history stack 흡수) ---
    // 반환: { content, setContent, replaceContent, dirty, savedAt, savingState, flush, flushAndWait, loadError,
    //        undo, redo, canUndo, canRedo, hasUnpublishedChanges, markPublished, flushPending }
    // savingState: "idle" | "saving" | "saved" | "error"
    // setContent 시그니처: setContent(next: Content | (prev) => Content, opts?: { immediate?: boolean })
    //   - default: typing — 500 ms debounce 로 history push
    //   - { immediate: true }: structural/atomic — 즉시 history push
    function useEditContent(token) {
      const initial = React.useMemo(() => (
        typeof structuredClone === "function"
          ? structuredClone(DEFAULT_CONTENT)
          : JSON.parse(JSON.stringify(DEFAULT_CONTENT))
      ), []);
      // NOTE: useHistoryStack 은 매 렌더마다 새 object literal 을 반환하므로 `history`
      // 전체를 useCallback 의존성으로 쓰면 모든 래퍼가 매 렌더 재생성된다. 내부 메서드들은
      // 각자 stable useCallback (deps 가 [] 또는 다른 stable 콜백) 이므로 ID 가 유지됨 —
      // 여기서 개별 메서드를 따로 보관하여 `setContent`/`replaceContent`/`flushAndWait` 의
      // 의존성을 안정화한다. publishedBaselineRef 는 initial 과 동일 참조를 공유하지만
      // codebase 가 replace-not-mutate 패턴만 쓰므로 안전.
      const history = useHistoryStack(initial);
      const histSetPresent = history.setPresent;
      const histReplacePresent = history.replacePresent;
      const histFlushPending = history.flushPending;
      const histMarkPublished = history.markPublished;
      const content = history.present;
      const [dirty, setDirty] = React.useState(false);
      const [savedAt, setSavedAt] = React.useState(null);
      const [savingState, setSavingState] = React.useState("idle");
      const [loadError, setLoadError] = React.useState(null);
      const contentRef = React.useRef(content);
      React.useEffect(() => { contentRef.current = content; }, [content]);

      // 초기 로드 — history stack 의 present 를 교체하되 Undo 스택 오염 최소화
      React.useEffect(() => {
        if (!token) return;
        let cancelled = false;
        fetchPortfolioDraft(token)
          .then(data => {
            if (cancelled) return;
            if (data) {
              // 초기 로드는 Undo 대상 아님 — past 에 DEFAULT_CONTENT 가 남는 현상은
              // 명시적 한계로 수용. Ctrl+Z 하면 최초 DEFAULT_CONTENT 로 돌아감.
              histReplacePresent(data, { immediate: true });
              setSavedAt(data.updatedAt || null);
              // publish baseline 을 로드된 draft 로 맞춤: 이미 published 와 동일한 것으로 간주
              histMarkPublished();
            }
            setDirty(false);
          })
          .catch(err => {
            if (cancelled) return;
            console.warn("Draft load failed:", err);
            setLoadError(err.message);
          });
        return () => { cancelled = true; };
        // histReplacePresent / histMarkPublished 는 identity-stable — token 변경 시에만 재실행.
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [token]);

      // auto-save (2s debounce)
      const doSave = React.useCallback(() => {
        if (!token) return Promise.resolve();
        setSavingState("saving");
        return savePortfolioDraft(token, contentRef.current)
          .then(data => {
            setSavingState("saved");
            setDirty(false);
            setSavedAt(data && data.updatedAt ? data.updatedAt : new Date().toISOString());
          })
          .catch(err => {
            console.warn("Draft save failed:", err);
            if (err.message === "UNAUTHORIZED") {
              setLoadError("UNAUTHORIZED");
            }
            setSavingState("error");
            throw err;
          });
      }, [token]);

      const [triggerSave, flushSave] = useDebouncedCallback(doSave, 2000);

      // setContent 래퍼 — opts 지원 + history push + dirty + triggerSave
      const setContent = React.useCallback((updater, opts) => {
        histSetPresent(prev => (
          typeof updater === "function" ? updater(prev) : updater
        ), opts);
        setDirty(true);
        triggerSave();
      }, [histSetPresent, triggerSave]);

      // replaceContent: History restore 등 "스택에 현재 값 push 하고 외부에서 준 값으로 교체"
      const replaceContent = React.useCallback((next) => {
        histReplacePresent(next, { immediate: true });
        setDirty(true);
        triggerSave();
      }, [histReplacePresent, triggerSave]);

      const flushAndWait = React.useCallback(() => {
        histFlushPending(); // pending history 먼저 commit
        const result = flushSave();
        return result instanceof Promise ? result : Promise.resolve();
      }, [histFlushPending, flushSave]);

      return {
        content, setContent, replaceContent,
        dirty, savedAt, savingState,
        flush: flushSave, flushAndWait, loadError,
        undo: history.undo, redo: history.redo,
        canUndo: history.canUndo, canRedo: history.canRedo,
        hasUnpublishedChanges: history.hasUnpublishedChanges,
        markPublished: histMarkPublished,
        flushPending: histFlushPending,
      };
    }

    // --- LoginModal ---
    // props: { onSuccess(token), onCancel() }
    // 검증: 입력한 pw 로 GET /api/portfolio/draft 호출 → 성공 시 onSuccess(pw) + token 저장, 실패 시 에러 표시
    function LoginModal({ onSuccess, onCancel }) {
      const [pw, setPw] = React.useState("");
      const [error, setError] = React.useState(null);
      const [busy, setBusy] = React.useState(false);
      const inputRef = React.useRef(null);

      React.useEffect(() => {
        if (inputRef.current) inputRef.current.focus();
      }, []);

      const submit = React.useCallback(async () => {
        if (!pw || busy) return;
        setBusy(true);
        setError(null);
        try {
          await fetchPortfolioDraft(pw);
          setAdminToken(pw);
          onSuccess(pw);
        } catch (e) {
          if (e.message === "UNAUTHORIZED") setError("비밀번호가 틀렸습니다.");
          else setError(`오류: ${e.message}`);
          setBusy(false);
        }
      }, [pw, busy, onSuccess]);

      const handleKey = (e) => {
        if (e.key === "Enter") submit();
        if (e.key === "Escape") onCancel();
      };

      return (
        <div className="login-modal-backdrop" onClick={(e) => {
          if (!busy && e.target === e.currentTarget) onCancel();
        }}>
          <div className="login-modal-box">
            <div className="title">Admin Login</div>
            {error && <div className="error">{error}</div>}
            <input
              ref={inputRef}
              type="password"
              placeholder="Password"
              value={pw}
              onChange={(e) => setPw(e.target.value)}
              onKeyDown={handleKey}
              disabled={busy}
            />
            <div className="btns">
              <button className="btn-enter" onClick={submit} disabled={busy}>
                {busy ? "..." : "Enter"}
              </button>
              <button className="btn-cancel" onClick={onCancel} disabled={busy}>
                Cancel
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- HTML sanitizer (리치 텍스트 블록용) ---
    // 허용 태그: b, strong, i, em, a (href/target/rel)
    // 그 외 태그/속성 모두 제거. XSS + TGL#1 회귀 방지.
    function sanitizeRichHtml(html) {
      if (!html) return "";
      const doc = new DOMParser().parseFromString(`<div>${html}</div>`, "text/html");
      const root = doc.body.firstChild;
      const ALLOWED_TAGS = new Set(["B", "STRONG", "I", "EM", "A"]);
      const ALLOWED_ATTRS = {
        A: new Set(["href", "target", "rel"]),
      };

      function walk(node) {
        const children = Array.from(node.childNodes);
        for (const child of children) {
          if (child.nodeType === Node.TEXT_NODE) continue;
          if (child.nodeType !== Node.ELEMENT_NODE) {
            child.remove();
            continue;
          }
          const tag = child.tagName;
          if (!ALLOWED_TAGS.has(tag)) {
            // 태그 제거하되 자식 텍스트는 보존 (unwrap)
            const textContent = document.createTextNode(child.textContent);
            child.replaceWith(textContent);
            continue;
          }
          // 속성 화이트리스트
          const allowedAttrs = ALLOWED_ATTRS[tag] || new Set();
          for (const attr of Array.from(child.attributes)) {
            if (!allowedAttrs.has(attr.name.toLowerCase())) {
              child.removeAttribute(attr.name);
            }
          }
          // href 는 허용 스킴 화이트리스트 (http/https/mailto/tel/fragment/상대경로)
          // 제어문자·공백 제거 후 검사 → `java\tscript:` 등 우회 차단
          if (tag === "A") {
            const rawHref = child.getAttribute("href") || "";
            const cleaned = rawHref.replace(/[\u0000-\u001F\u007F\s]/g, "");
            let safe = false;
            if (cleaned.startsWith("#")) {
              safe = true; // fragment
            } else if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(cleaned)) {
              const scheme = cleaned.match(/^([a-zA-Z][a-zA-Z0-9+.-]*):/)[1].toLowerCase();
              safe = ["http", "https", "mailto", "tel"].includes(scheme);
            } else if (!cleaned.startsWith("//")) {
              safe = true; // 상대 경로 (protocol-relative //evil.com 차단)
            }
            if (!safe) {
              child.removeAttribute("href");
            }
            // 외부 링크는 rel 보강
            if (child.getAttribute("target") === "_blank") {
              child.setAttribute("rel", "noopener noreferrer");
            }
          }
          walk(child);
        }
      }

      walk(root);
      return root.innerHTML;
    }

    // href 스킴 화이트리스트 — sanitizer 의 A 태그 분기와 동일 규칙을 scalar href 필드에 적용
    // (ButtonBlock, ProfileSection inventory 등 HTML 아닌 직접 속성 바인딩 경로용)
    function safeHref(raw) {
      if (!raw) return "#";
      const cleaned = String(raw).replace(/[\u0000-\u001F\u007F\s]/g, "");
      if (!cleaned) return "#";
      if (cleaned.startsWith("#")) return cleaned;
      const schemeMatch = cleaned.match(/^([a-zA-Z][a-zA-Z0-9+.-]*):/);
      if (schemeMatch) {
        const scheme = schemeMatch[1].toLowerCase();
        return ["http", "https", "mailto", "tel"].includes(scheme) ? cleaned : "#";
      }
      if (cleaned.startsWith("//")) return "#";
      return cleaned;
    }

        ? "pixel-font text-xl md:text-2xl rpg-title"
        : "pixel-font text-lg text-yellow-300 mt-6 mb-2";
      const Tag = block.level === 2 ? "h2" : "h3";
      return (
        <Tag className={sizeClass}>
          {block.emoji && <span>{block.emoji} </span>}
          {block.text}
        </Tag>
      );
    }

    function ListBlock({ block }) {
      const listClass = block.style === "decimal" ? "list-decimal" : "list-disc";
      const mb = block.marginBottom || "mb-6";
      const spaceY = block.spaceY !== undefined ? block.spaceY : "space-y-2";
      const ulClass = `${listClass} pl-6 ${mb} ${spaceY} text-lg text-gray-300`.replace(/\s+/g, " ").trim();
      return (
        <ul className={ulClass}>
          {block.items.map((item, i) => {
            if (item.note) {
              const noteHtml = sanitizeRichHtml(item.text || "");
              return (
                <li
                  key={i}
                  className="text-gray-400 text-base mt-2 list-none"
                  dangerouslySetInnerHTML={{ __html: noteHtml }}
                />
              );
            }
            const strongHtml = sanitizeRichHtml(item.strong || "");
            const textHtml = sanitizeRichHtml(item.text || "");
            return (
              <li key={i}>
                {item.strong && (
                  <strong
                    className="text-white"
                    dangerouslySetInnerHTML={{ __html: strongHtml }}
                  />
                )}
                <span dangerouslySetInnerHTML={{ __html: textHtml }} />
              </li>
            );
          })}
        </ul>
      );
    }

    function ImageBlock({ block }) {
      return (
        <figure className="mb-6">
          <img
            src={block.url}
            alt={block.alt || ""}
            style={{
              width: block.width ? `${block.width}px` : "100%",
              maxWidth: "100%",
              height: "auto",
              border: "3px solid #6c6c6c",
              boxShadow: "4px 4px 0px #000",
            }}
          />
          {block.caption && (
            <figcaption className="pixel-font text-center py-3 px-2" style={{ fontSize: "0.6rem", color: "#f1c40f" }}>
              {block.caption}
            </figcaption>
          )}
        </figure>
      );
    }

    function YoutubeBlock({ block }) {
      // mediaKind === "image": Cloudinary 호스팅 이미지/GIF 렌더
      // mediaKind === "video" 또는 미지정(하위호환): YouTube iframe
      if (block.mediaKind === "image" && block.imageUrl) {
        return (
          <div className="mb-8" style={{ border: "3px solid #6c6c6c", boxShadow: "4px 4px 0px #000" }}>
            <img
              src={block.imageUrl}
              alt={block.imageAlt || block.title || ""}
              style={{ display: "block", width: "100%", height: "auto" }}
              loading="lazy"
            />
            {block.imageCaption && (
              <div className="text-center text-sm text-gray-400 mt-2 mb-2 pixel-font">
                {block.imageCaption}
              </div>
            )}
          </div>
        );
      }
      const src = `https://www.youtube.com/embed/${block.videoId || ""}${block.start ? `?start=${block.start}` : ""}`;
      return (
        <div className="yt-container mb-8" style={{ border: "3px solid #6c6c6c", boxShadow: "4px 4px 0px #000" }}>
          <iframe
            src={src}
            title={block.title || ""}
            frameBorder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowFullScreen
          />
        </div>
      );
    }

    function ButtonBlock({ block }) {
      return (
        <a
          href={safeHref(block.href)}
          target={block.target || "_self"}
          rel={block.target === "_blank" ? "noopener noreferrer" : undefined}
          className="btn-pixel"
        >
          <IconSvg name={block.icon} />
          <span className="btn-pixel-text">{block.label}</span>
        </a>
      );
    }

    function CardGridBlock({ block }) {
      const colsClass = block.cols === 2
        ? "grid grid-cols-1 lg:grid-cols-2 gap-6"
        : "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6";

      // per-card kind 폴백: card.kind → block.variant → "text"
      // (기존 DEFAULT_CONTENT 데이터는 card.kind 없이 block.variant 만 있으므로 그대로 호환)
      const resolveKind = (c) => c.kind || block.variant || "text";

      function renderCard(c, i) {
        const kind = resolveKind(c);
        if (kind === "video") {
          return (
            <div key={i} className="video-card">
              <div className="yt-container">
                <iframe
                  src={`https://www.youtube.com/embed/${c.videoId || ""}`}
                  title={c.title || ""}
                  frameBorder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen
                />
              </div>
              <p className="pixel-font text-center py-3 px-2" style={{ fontSize: "0.6rem", color: "var(--gold)" }}>
                {c.title}
              </p>
            </div>
          );
        }
        if (kind === "image") {
          return (
            <figure key={i} className="video-card">
              <img
                src={c.url || ""}
                alt={c.alt || ""}
                loading="lazy"
                style={{ width: "100%", height: "auto", display: "block" }}
              />
              {c.caption && (
                <p className="pixel-font text-center py-3 px-2" style={{ fontSize: "0.6rem", color: "var(--gold)" }}>
                  {c.caption}
                </p>
              )}
            </figure>
          );
        }
        // text (Experiences 스타일)
        return (
          <div key={i}>
            <span className={`text-${c.titleColor || "yellow-400"} font-bold text-lg`}>{c.title}</span>
            <br />
            <span className="text-gray-300">{c.description}</span>
          </div>
        );
      }

      return (
        <div className={colsClass}>
          {block.cards.map(renderCard)}
        </div>
      );
    }

    // --- Block dispatcher ---
    function Block({ block }) {
      switch (block.type) {
        case "text":     return <TextBlock block={block} />;
        case "heading":  return <HeadingBlock block={block} />;
        case "list":     return <ListBlock block={block} />;
        case "image":    return <ImageBlock block={block} />;
        case "youtube":  return <YoutubeBlock block={block} />;
        case "button":   return <ButtonBlock block={block} />;
        case "cardgrid": return <CardGridBlock block={block} />;
        default:
          console.warn("Unknown block type:", block.type);
          return null;
      }
    }

    /* ============================================================
       HEADER STAGE — grayscale side-scrolling pixel game stage.
       Pure Canvas 2D. Parallax sky/mountains/clouds + tile ground,
       walking hero, question blocks, bricks, coins, pipes, goomba.
       Hero jumps when a pipe enters the trigger zone.
       ============================================================ */
    // Pixel-art helper: each char in a sprite row is a palette index. '.' = transparent.
    function drawHeroSprite(ctx, sprite, palette, x, y, scale) {
      for (let row = 0; row < sprite.length; row++) {
        const line = sprite[row];
        for (let col = 0; col < line.length; col++) {
          const ch = line[col];
          if (ch === '.' || ch === ' ') continue;
          const color = palette[ch];
          if (!color) continue;
          ctx.fillStyle = color;
          ctx.fillRect(x + col * scale, y + row * scale, scale, scale);
        }
      }
    }

    // Grayscale 4-tone DMG-style palette. 0=#1a1a1a, 1=#606060, 2=#c0c0c0, 3=#ffffff
    const HERO_PAL    = { '0':'#1a1a1a','r':'#1a1a1a','s':'#ffffff','b':'#606060','y':'#c0c0c0','w':'#ffffff','h':'#1a1a1a' };

    const CLOUD_PAL   = { '0':'#1a1a1a','w':'#ffffff','g':'#c0c0c0' };
    const BUSH_PAL    = { '0':'#1a1a1a','g':'#606060','l':'#c0c0c0','d':'#1a1a1a' };
    const GOOM_PAL    = { '0':'#1a1a1a','b':'#606060','d':'#1a1a1a','f':'#c0c0c0','w':'#ffffff','k':'#1a1a1a' };

    const HERO_WALK_A = [

    const HERO_JUMP = [

      "..0bybyb0.......",".0bbybybb0......","0bbbbbbbbbb0....","0bb0bbbb0bb0....",
      "0b0.0bbb0.0b0...",".0...0b0...0....","....0ssss0......","...0ss0ss0......",
    ];
    const QBLOCK = [

      "0yy0ddddddd0yyo0","0yy0dd000dd0yyo0","0yy0dd0yd00dyyo0","0yyyyyyd0dddyyo0",
      "0yyyyyy0ddddyyo0","0yyyyy0dddyyyyo0","0yyyyy0dddyyyyo0","0yyyyyyyyyyyyyo0",

    const BRICK = [

      "0000000000000000","0rrrrrrrrrrr0rr0","0hhhhhhhhhhh0hh0","0rrrrrrrrrrr0rr0",
      "0000000000000000","0rrrrr0rrrrrrrr0","0hhhhh0hhhhhhhh0","0rrrrr0rrrrrrrr0",
      "0000000000000000","0rrrrrrrrrrr0rr0","0hhhhhhhhhhh0hh0","0000000000000000",
    ];
    const COIN_A = [
      "....0000....","...0yyyy0...","..0ywyyyo0..",".0ywy00yo0..",".0ywy00yo0..",
      ".0ywy00yo0..",".0ywy00yo0..",".0ywy00yo0..",".0ywy00yo0..",".0ywy00yo0..",
      ".0ywy00yo0..","..0yyyyo0...","...0yyo0....","....0000....",

    const COIN_B = [
      ".....00.....","....0yy0....","....0yy0....","....0yy0....","....0yo0....",

    const PIPE_TOP = [
      "00000000000000000000000000000000",
      "0llllllllllllllllllllllllllllld0",
      "0lggggggggggggggggggggggggggggd0",
      "0lggggggggggggggggggggggggggggd0",
      "0lggggggggggggggggggggggggggggd0",
      "0lggggggggggggggggggggggggggggd0",

    const GROUND = [
      "gggggggggggggggg","GgGgGgGgGgGgGgGg","GgGGgGGgGGgGGgGG","dddddddddddddddd",
      "DdDdddDddDddDddD","dDddDDddDdDdDddD","DdDddDdDdDdDdDdD","dDddDDddDdDdDdDd",
      "DdDddDdDdDdDdDdD","dDdDdDddDdDdDdDd","DdDddDdDdDdDdDdD","dDdDdDddDdDdDdDd",
      "DdDddDdDdDdDdDdD","dDdDdDddDdDdDdDd","DdDddDdDdDdDdDdD","kkkkkkkkkkkkkkkk",
    ];
    function drawHeroMountain(ctx, x, y, scale, w, h) {
      const s1="#606060", s2="#1a1a1a", ss="#ffffff", se="#1a1a1a";
      for (let row = 0; row < h; row++) {
        const progress = row / h;
        const half = Math.round(progress * (w / 2));
        const xs = w/2 - half, xe = w/2 + half;
        for (let col = Math.floor(xs); col < Math.ceil(xe); col++) {
          let c = s1;
          if (col < w/2 - half*0.55) c = s2;
          if (row < h*0.18 && col > w/2 - half*0.9 && col < w/2 + half*0.9) c = ss;
          if (col === Math.floor(xs) || col === Math.ceil(xe)-1) c = se;
          ctx.fillStyle = c;
          ctx.fillRect(x + col*scale, y + row*scale, scale, scale);
        }
      }
    }
    const CLOUD = [
      "....0000........","...0wwww0000....","..0wwwwwwww0....",".0wwwwwwwwww000.",
      "0wwwwwwwwwwwww0.","0wggwwggwwggwww0","0wwwwwwwwwwwww0.",".00000000000000.",
    ];
    const BUSH = [
      "....0000...0000.....","...0llgg0.0llgg0....",".000llggg000llggg0..",
      "0llgggggggglllggggg0","0lggggdggggggggdgggg","0dddddddddddddddddd0",
    ];
    const GOOM_A = [
      "....000000......","..00bbbbbb00....",".0bbbbbbbbbb0...",".0bdbbbbbbdb0...",
      "0bbbbbbbbbbbb0..","0bbdbbbbbbdbb0..","0bbddbbbbddbb0..","0bbdddddddddb0..",
      "0bbdddbbbddbb0..",".0fffffffff0....",".0fwkfffkwf0....","0ffkkfffkkff0...",
      "0fffffffffff0...","0dd0000dd00dd0..","0dd0..0dd0..0d..","0000..00000..0..",
    ];

    // Goomba dialogue keyed by world x (matches OBJECTS).
    // Default lines; can be overridden from the Tweaks panel.
    const GOOMBA_DEFAULT_LINES = {
      560:  "Hi~ Jongil",
      1060: "Please don't tread me",
      1100: "I'm not gonna hurt you",
    };
    const GOOMBA_ORDER = [560, 1060, 1100]; // index → world x
    function goombaLineFor(worldX) {
      try {
        const arr = (window.__heroBubbleTweaks && window.__heroBubbleTweaks.lines) || null;
        const idx = GOOMBA_ORDER.indexOf(worldX);
        if (arr && idx >= 0 && typeof arr[idx] === 'string' && arr[idx].length) return arr[idx];
      } catch(_) {}
      return GOOMBA_DEFAULT_LINES[worldX] || "...";
    }

    function HeaderStage({ header }) {
      const canvasRef = React.useRef(null);
      const rafRef = React.useRef(0);
      const [bubbles, setBubbles] = React.useState([]);
      const bubblesRef = React.useRef([]);       // canonical list updated in tick
      const bubbleSyncRef = React.useRef(0);
      const triggeredRef = React.useRef(new Set()); // which (goombaX, cycle) already spoken
      const stateRef = React.useRef({
        scroll: 0, speed: 40,
        walkFrame: 0, walkTimer: 0,
        coinFrame: 0, coinTimer: 0,
        goombaWobble: 0,
        jumpT: -1, jumpDur: 0.7,
        jumpedPipes: new Set(),
        lastCycle: 0,
      });

      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = false;

        const VH = 180;
        let VW = 320, SCALE = 2;

        function resize() {
          const rect = canvas.getBoundingClientRect();
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = rect.width * dpr;
          canvas.height = rect.height * dpr;
          SCALE = Math.max(1, Math.floor(canvas.height / VH));
          VW = Math.ceil(canvas.width / SCALE);
          ctx.imageSmoothingEnabled = false;
          ctx.setTransform(1,0,0,1,0,0);
        }
        resize();
        const ro = new ResizeObserver(resize);
        ro.observe(canvas);

        const LEVEL_LEN = 1600;
        const GROUND_Y = VH - 32;
        const OBJECTS = [
          { type:'qblock', x:160, y:GROUND_Y-52 }, { type:'brick', x:192, y:GROUND_Y-52 },
          { type:'qblock', x:224, y:GROUND_Y-52 }, { type:'brick', x:256, y:GROUND_Y-52 },
          { type:'qblock', x:240, y:GROUND_Y-100 },
          { type:'coin', x:328, y:GROUND_Y-48 }, { type:'coin', x:352, y:GROUND_Y-48 }, { type:'coin', x:376, y:GROUND_Y-48 },
          { type:'pipe', x:440, y:GROUND_Y-16 },
          { type:'goomba', x:560, y:GROUND_Y-18 },
          { type:'qblock', x:660, y:GROUND_Y-52 }, { type:'brick', x:692, y:GROUND_Y-52 },
          { type:'brick', x:724, y:GROUND_Y-52 }, { type:'qblock', x:756, y:GROUND_Y-52 },
          { type:'coin', x:820, y:GROUND_Y-72 }, { type:'coin', x:844, y:GROUND_Y-72 },
          { type:'pipe', x:920, y:GROUND_Y-16 },
          { type:'goomba', x:1060, y:GROUND_Y-18 }, { type:'goomba', x:1100, y:GROUND_Y-18 },
          { type:'brick', x:1180, y:GROUND_Y-52 }, { type:'qblock', x:1212, y:GROUND_Y-52 },
          { type:'brick', x:1244, y:GROUND_Y-52 },
          { type:'pipe', x:1340, y:GROUND_Y-16 },
          { type:'coin', x:1460, y:GROUND_Y-48 }, { type:'coin', x:1484, y:GROUND_Y-48 },
        ];
        const MOUNTAINS = [
          { x:60,w:56,h:28 },{ x:220,w:72,h:36 },{ x:420,w:60,h:30 },
          { x:640,w:80,h:40 },{ x:860,w:64,h:32 },{ x:1080,w:72,h:36 },{ x:1300,w:56,h:28 },
        ];
        const CLOUDS = [
          { x:40,y:24 },{ x:180,y:40 },{ x:340,y:18 },{ x:520,y:36 },
          { x:700,y:22 },{ x:860,y:42 },{ x:1020,y:26 },{ x:1200,y:38 },{ x:1380,y:20 },
        ];
        const BUSHES = [
          { x:80 },{ x:340 },{ x:600 },{ x:780 },{ x:1000 },{ x:1260 },{ x:1480 },
        ];

        function drawBG() {
          ctx.fillStyle = "#c0c0c0";
          ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.fillStyle = "#d0d0d0";
          ctx.fillRect(0,0,canvas.width, 20*SCALE);
        }
        function drawClouds(s) {
          const cs = s*0.3;
          for (const c of CLOUDS) {
            let cx = ((c.x - cs) % LEVEL_LEN);
            if (cx < -40) cx += LEVEL_LEN;
            drawHeroSprite(ctx, CLOUD, CLOUD_PAL, cx*SCALE, c.y*SCALE, SCALE);
          }
        }
        function drawMountains(s) {
          const ms = s*0.5;
          for (const m of MOUNTAINS) {
            let mx = ((m.x - ms) % LEVEL_LEN);
            if (mx < -m.w) mx += LEVEL_LEN;
            drawHeroMountain(ctx, mx*SCALE, (GROUND_Y - m.h)*SCALE, SCALE, m.w, m.h);
          }
        }
        function drawBushes(s) {
          const bs = s*0.85;
          for (const b of BUSHES) {
            let bx = ((b.x - bs) % LEVEL_LEN);
            if (bx < -40) bx += LEVEL_LEN;
            drawHeroSprite(ctx, BUSH, BUSH_PAL, bx*SCALE, (GROUND_Y-6)*SCALE, SCALE);
          }
        }
        function drawGround(s) {
          const tileW = 16;
          const startX = -((s) % tileW);
          for (let r = 0; r < 2; r++) {
            for (let x = startX; x < VW + tileW; x += tileW) {
              drawHeroSprite(ctx, GROUND, GROUND_PAL, x*SCALE, (GROUND_Y + r*tileW)*SCALE, SCALE);
            }
          }
        }
        function drawObjects(s, coinFrame, goombaWobble) {
          for (const o of OBJECTS) {
            let ox = o.x - s;
            ox = ((ox % LEVEL_LEN) + LEVEL_LEN) % LEVEL_LEN;
            if (ox > VW + 40) ox -= LEVEL_LEN;
            if (ox < -40) continue;
            if (o.type==='qblock') drawHeroSprite(ctx, QBLOCK, QBLOCK_PAL, ox*SCALE, o.y*SCALE, SCALE);
            else if (o.type==='brick') drawHeroSprite(ctx, BRICK, BRICK_PAL, ox*SCALE, o.y*SCALE, SCALE);
            else if (o.type==='coin') {
              const sprite = coinFrame ? COIN_A : COIN_B;
              drawHeroSprite(ctx, sprite, COIN_PAL, ox*SCALE, o.y*SCALE, SCALE);
            }
            else if (o.type==='pipe') drawHeroSprite(ctx, PIPE_TOP, PIPE_PAL, ox*SCALE, o.y*SCALE, SCALE);
            else if (o.type==='goomba') {
              const wob = Math.sin(goombaWobble + o.x*0.01) * 1;
              drawHeroSprite(ctx, GOOM_A, GOOM_PAL, ox*SCALE, (o.y+wob)*SCALE, SCALE);
            }
          }
        }
        function drawHero(frame, jumpOffset, isJumping) {
          const hx = Math.floor(VW * 0.22);
          const hy = GROUND_Y - 16 - jumpOffset;
          const bob = (frame % 2 === 0) ? 0 : -1;
          const sprite = isJumping ? HERO_JUMP :
            (frame===0 ? HERO_WALK_A : frame===1 ? HERO_IDLE : HERO_WALK_B);
          drawHeroSprite(ctx, sprite, HERO_PAL, hx*SCALE, (hy+bob)*SCALE, SCALE);
          if (!isJumping) {
            ctx.fillStyle = "rgba(0,0,0,0.25)";
            ctx.fillRect((hx-3)*SCALE, (hy+14)*SCALE, 2*SCALE, 2*SCALE);
          }
        }

        let last = performance.now();
        function tick(now) {
          const dt = Math.min(0.05, (now - last)/1000);
          last = now;
          const st = stateRef.current;

          // Boost forward speed while airborne so hero clears the pipe.
          const effSpeed = st.jumpT >= 0 ? st.speed * 2.4 : st.speed;
          st.scroll += effSpeed * dt;
          if (st.scroll >= LEVEL_LEN) st.scroll -= LEVEL_LEN;

          st.walkTimer += dt;
          if (st.walkTimer > 0.15) { st.walkTimer = 0; st.walkFrame = (st.walkFrame+1) % 3; }
          st.coinTimer += dt;
          if (st.coinTimer > 0.2) { st.coinTimer = 0; st.coinFrame = (st.coinFrame+1) % 2; }
          st.goombaWobble += dt * 6;

          // Jump trigger: start the hop so apex aligns with the pipe.
          const hxWorld = st.scroll + Math.floor(VW * 0.22);
          for (const o of OBJECTS) {
            if (o.type !== 'pipe') continue;
            let dx = o.x - hxWorld;
            if (dx < -LEVEL_LEN/2) dx += LEVEL_LEN;
            if (dx > LEVEL_LEN/2) dx -= LEVEL_LEN;
            if (dx > 8 && dx < 28 && st.jumpT < 0 && !st.jumpedPipes.has(o.x)) {
              st.jumpT = 0;
              st.jumpedPipes.add(o.x);
            }
          }
          // Clean up jumped-pipe memory when it's far behind
          for (const x of Array.from(st.jumpedPipes)) {
            if (x < st.scroll - 80 || x > st.scroll + LEVEL_LEN - 40) st.jumpedPipes.delete(x);
          }
          // Advance jump
          let jumpOffset = 0;
          let isJumping = false;
          if (st.jumpT >= 0) {
            st.jumpT += dt / st.jumpDur;
            if (st.jumpT >= 1) { st.jumpT = -1; jumpOffset = 0; isJumping = false; }
            else { jumpOffset = Math.sin(st.jumpT * Math.PI) * 40; isJumping = true; }
          }

          ctx.setTransform(1,0,0,1,0,0);
          ctx.clearRect(0,0,canvas.width,canvas.height);
          drawBG();
          drawClouds(st.scroll);
          drawMountains(st.scroll);
          drawBushes(st.scroll);
          drawObjects(st.scroll, st.coinFrame, st.goombaWobble);
          drawGround(st.scroll);
          drawHero(st.walkFrame, jumpOffset, isJumping);

          /* ---- Goomba speech bubbles ---- */
          const goombas = OBJECTS.filter(o => o.type === 'goomba');
          const heroLogicalX = st.scroll + VW * 0.22;
          // Detect loop (scroll wrapped): clear triggered set so bubbles re-appear each lap
          if (st.scroll < st.lastCycle - LEVEL_LEN/2) {
            triggeredRef.current.clear();
          }
          st.lastCycle = st.scroll;

          const TW = window.__heroBubbleTweaks || {};
          const trigX = (TW.bubbleTrigX == null ? 20 : TW.bubbleTrigX);   // start bubble when hero is within X logical px ahead of goomba
          const bubbleDur = (TW.bubbleDuration == null ? 2.0 : TW.bubbleDuration);
          const bubbleFade = (TW.bubbleFade == null ? 0.3 : TW.bubbleFade);

          for (const g of goombas) {
            // trigger when hero is approaching the goomba from the left
            let dx = g.x - heroLogicalX;
            if (dx < -LEVEL_LEN/2) dx += LEVEL_LEN;
            if (dx > LEVEL_LEN/2) dx -= LEVEL_LEN;
            const key = g.x;
            if (!triggeredRef.current.has(key) && dx > 0 && dx <= trigX) {
              triggeredRef.current.add(key);
              bubblesRef.current.push({
                id: key + '_' + performance.now().toFixed(0),
                goombaX: g.x,
                text: goombaLineFor(g.x),
                t: 0,
                dur: bubbleDur,
                fade: bubbleFade,
              });
            }
          }
          // Advance lifetimes
          for (let i = bubblesRef.current.length - 1; i >= 0; i--) {
            const b = bubblesRef.current[i];
            b.t += dt;
            if (b.t > b.dur) bubblesRef.current.splice(i, 1);
          }
          // Compute screen positions (CSS px within hero-canvas-wrap)
          const rect = canvas.getBoundingClientRect();
          const cssPerLogical = rect.width / VW;
          const bubbleList = bubblesRef.current.map(b => {
            let gx = b.goombaX - st.scroll;
            gx = ((gx % LEVEL_LEN) + LEVEL_LEN) % LEVEL_LEN;
            if (gx > VW + 40) gx -= LEVEL_LEN;
            // Goomba top in logical px = GROUND_Y - 18 (its y)
            const goombaLogicalTop = GROUND_Y - 18;
            const left = gx * cssPerLogical;
            const top = goombaLogicalTop * cssPerLogical;
            // Fade envelope
            const f = b.fade;
            const inA = Math.min(1, b.t / f);
            const outA = Math.min(1, Math.max(0, (b.dur - b.t) / f));
            const alpha = Math.min(inA, outA);
            // Rise animation
            const rise = (1 - inA) * 6;
            return { id: b.id, left, top: top - rise, alpha, text: b.text };
          });
          // Push to React state only when the list shape changed or ~20Hz
          bubbleSyncRef.current += dt;
          if (bubbleSyncRef.current > 0.05) {
            bubbleSyncRef.current = 0;
            setBubbles(bubbleList);
          }

          rafRef.current = requestAnimationFrame(tick);
        }
        rafRef.current = requestAnimationFrame(tick);

        return () => {
          cancelAnimationFrame(rafRef.current);
          ro.disconnect();
        };
      }, []);

      return (
        <div className="hero-shell">
          <div className="hero-canvas-wrap">
            <canvas ref={canvasRef} className="hero-canvas" />
          </div>
          <div className="hero-bubbles-layer">
            {bubbles.map(b => {

              const size = TW.bubbleSize == null ? 10 : TW.bubbleSize; // font-size px

              return (
                <div
                  key={b.id}

                  style={{
                    left: b.left + 'px',
                    top: (b.top - yOff) + 'px',
                    opacity: b.alpha,
                    fontSize: size + 'px',
                  }}>

                </div>
              );
            })}
          </div>
          <div className="hero-scanlines" />
          <div className="hero-hud-top">

    }

              {row('PAN Y',    'heroPanY',   -200, 200, 1)}

              <div style={{ height: 1, background:'#ccc', margin:'10px 0' }} />

              {row('BUB TRIG X', 'bubbleTrigX',     4, 80, 1)}
              {row('BUB DUR',    'bubbleDuration',  0.5, 5.0, 0.1)}

              <div style={{ height: 1, background:'#ccc', margin:'10px 0' }} />

              <button

    // --- Block factory (Plan B Task 8 / Plan C Task 1: stable IDs) ---
    function newBlockId() {
      // crypto.randomUUID 는 secure context (https / http://127.0.0.1) 에서 지원.
      // file:// 에서는 메서드는 존재하나 호출 시 DOMException 발생 → try/catch 로 fallback 경로 확보.
      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        try {
          return "b_" + crypto.randomUUID();
        } catch (_) {
          // insecure context (file://) 에서 randomUUID 가 throw — fallback 으로 내려감
        }
      }
      return "b_" + Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
    }

    // --- Task 9: Inline contentEditable block editors ---

    // EditableTextBlock: uncontrolled, uses ref to set innerHTML only when block.html changes
    function EditableTextBlock({ block, onChange }) {
      const ref = React.useRef(null);

      React.useEffect(() => {
        if (ref.current && ref.current.innerHTML !== block.html) {
          ref.current.innerHTML = block.html || "";
        }
      }, [block.html]);

      const handleBlur = () => {
        const raw = ref.current.innerHTML;
        const clean = sanitizeRichHtml(raw);
        if (clean !== block.html) {
          onChange({ ...block, html: clean });
        }
      };

      return (
        <p
          ref={ref}
          className="text-lg leading-relaxed text-gray-300 mb-4"
          contentEditable="true"
          suppressContentEditableWarning
          onBlur={handleBlur}
        />
      );
    }

    // EditableHeadingBlock: plain text (no rich), emoji stays outside editable span
    function EditableHeadingBlock({ block, onChange }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (ref.current && ref.current.textContent !== block.text) {
          ref.current.textContent = block.text || "";
        }
      }, [block.text]);

      const handleBlur = () => {
        const text = ref.current.textContent || "";
        if (text !== block.text) onChange({ ...block, text });
      };

      const Tag = block.level === 2 ? "h2" : "h3";
      const cls = block.level === 2
        ? "pixel-font rpg-title text-2xl mb-4"
        : "pixel-font text-yellow-300 text-xl mb-3";
      return (
        <Tag className={cls}>
          {block.emoji && <span className="mr-2">{block.emoji}</span>}
          <span
            ref={ref}
            contentEditable="true"
            suppressContentEditableWarning
            onBlur={handleBlur}
          />
        </Tag>
      );
    }

    // EditableInline: generic span contentEditable — rich=true uses innerHTML+sanitize, rich=false uses textContent
    function EditableInline({ value, rich, onCommit, onEnter, onBackspaceEmpty }) {
      const ref = React.useRef(null);
      React.useEffect(() => {
        if (!ref.current) return;
        const current = rich ? ref.current.innerHTML : ref.current.textContent;
        if (current !== value) {
          if (rich) ref.current.innerHTML = value || "";
          else ref.current.textContent = value || "";
        }
      }, [value, rich]);

      const handleBlur = () => {
        const raw = rich ? ref.current.innerHTML : ref.current.textContent;
        const next = rich ? sanitizeRichHtml(raw) : (raw || "");
        if (next !== value) onCommit(next);
      };
      const handleKey = (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          ref.current.blur();
          if (onEnter) onEnter();
        }
        if (e.key === "Backspace") {
          const raw = rich ? ref.current.innerHTML : ref.current.textContent;
          // rich 분기: 브라우저가 빈 contenteditable 에 <br> placeholder 를 자동 삽입하므로
          // 이를 제거한 뒤에 빈지 검사한다. 공백만 남는 경우도 빈 것으로 간주.
          const isEmpty = rich
            ? (!raw || raw.replace(/<br\s*\/?>/gi, "").replace(/&nbsp;/g, "").trim() === "")
            : !raw;
          if (isEmpty && onBackspaceEmpty) {
            e.preventDefault();
            onBackspaceEmpty();
          }
        }
      };

      return (
        <span
          ref={ref}
          contentEditable="true"
          suppressContentEditableWarning
          onBlur={handleBlur}
          onKeyDown={handleKey}
        />
      );
    }

    // EditableListBlock: each item has strong + text via EditableInline, supports note items
    function EditableListBlock({ block, onChange }) {
      const updateItem = (i, patch) => {
        const next = block.items.map((it, idx) => idx === i ? { ...it, ...patch } : it);
        onChange({ ...block, items: next });
      };
      const addItem = (afterIdx) => {
        const next = block.items.slice();
        next.splice(afterIdx + 1, 0, { strong: "", text: "" });
        onChange({ ...block, items: next });
      };
      const removeItem = (i) => {
        if (block.items.length <= 1) return;
        const next = block.items.filter((_, idx) => idx !== i);
        onChange({ ...block, items: next });
      };

      const ListTag = block.style === "decimal" ? "ol" : "ul";
      const listCls = block.style === "decimal" ? "list-decimal" : "list-disc";
      const spaceY = block.spaceY || "space-y-2";
      const mb = block.marginBottom || "mb-4";

      return (
        <ListTag className={`${listCls} pl-5 ${spaceY} ${mb} text-gray-300`}>
          {block.items.map((item, i) => {
            if (item.note) {
              return (
                <li key={i} className="list-none text-sm text-gray-500 italic mt-1">
                  <EditableInline
                    value={item.text || ""}
                    rich={false}
                    onCommit={(text) => updateItem(i, { text })}
                    onEnter={() => addItem(i)}
                    onBackspaceEmpty={() => removeItem(i)}
                  />
                </li>
              );
            }
            return (
              <li key={i}>
                <strong>
                  <EditableInline
                    value={item.strong || ""}
                    rich={false}
                    onCommit={(strong) => updateItem(i, { strong })}
                  />
                </strong>
                <span>{" "}</span>
                <EditableInline
                  value={item.text || ""}
                  rich={true}
                  onCommit={(text) => updateItem(i, { text })}
                  onEnter={() => addItem(i)}
                  onBackspaceEmpty={() => removeItem(i)}
                />
              </li>
            );
          })}
        </ListTag>
      );
    }

    // EditableBlockContent: dispatcher — text/heading/list → editable versions, others → read-only Block
    function EditableBlockContent({ block, onChange }) {

        // image / youtube / button / cardgrid — settings panel based (Task 11+)
        default:        return <Block block={block} />;
      }
    }

          {kind === "text" && (

              <select
