    function CardgridBlockEdit({ block, onChange, token, onClose }) {
      const updateCard = (i, nextCard, opts) => {
        const cards = block.cards.map((c, idx) => idx === i ? nextCard : c);
        onChange({ ...block, cards }, opts);
      };
      const addCard = () => {
        const defaultKind = block.variant || "text";
        onChange({ ...block, cards: [...block.cards, createEmptyCard(defaultKind)] }, { immediate: true });
      };
      const removeCard = (i) => {
        onChange({ ...block, cards: block.cards.filter((_, idx) => idx !== i) }, { immediate: true });
      };

      return (
        <SettingsPanel title="Card Grid Block" onClose={onClose}>
          <label>컬럼 수</label>
          <select
            value={block.cols || 2}
            onChange={(e) => onChange({ ...block, cols: parseInt(e.target.value, 10) }, { immediate: true })}
          >
            <option value={2}>2</option>
            <option value={3}>3</option>
          </select>

          <label>새 카드 기본 타입</label>
          <select
            value={block.variant || "text"}
            onChange={(e) => {
              const nextVariant = e.target.value;
              // 기존에 kind 필드가 없던 카드(구 DEFAULT_CONTENT 데이터) 는 현재 variant 로 stamp
              // → default 바꿔도 기존 카드 flip 방지
              const currentImplicitKind = block.variant || "text";
              const migratedCards = block.cards.map(c =>
                c.kind ? c : { ...c, kind: currentImplicitKind }
              );
              onChange({ ...block, cards: migratedCards, variant: nextVariant }, { immediate: true });
            }}
          >
            <option value="text">📝 Text</option>
            <option value="video">🎬 Video</option>
            <option value="image">🖼 Image / GIF</option>
          </select>
          <div style={{ fontSize: "0.72rem", color: "#a2a2a2", marginTop: 4, lineHeight: 1.4 }}>
            ※ 이 값은 "+ 카드 추가" 시 기본값으로만 쓰입니다. 각 카드의 타입은 아래에서 개별적으로 변경 가능.
          </div>

          <label>카드 목록</label>
          {block.cards.map((card, i) => (
            <CardgridCardEditor
              key={i}
              card={card}
              index={i}
              token={token}
              blockVariant={block.variant}
              onUpdate={(next, opts) => updateCard(i, next, opts)}
              onRemove={() => removeCard(i)}
            />
          ))}
          <button
            onClick={addCard}
            style={{ width: "100%", background: "transparent", border: "2px dashed #6c6c6c", color: "#a2a2a2", padding: 8, borderRadius: 2, cursor: "pointer", fontFamily: "inherit" }}
          >+ 카드 추가</button>
        </SettingsPanel>
      );
    }

    // --- Task 10: FloatingRichTextToolbar ---
    // Subscribes to document selectionchange. Shows above selected text inside [contenteditable].
    // execCommand is deprecated but works in all current browsers — intentional (Plan B scope).
    function FloatingRichTextToolbar() {
      const [state, setState] = React.useState({ visible: false, top: 0, left: 0 });
      const [linkMode, setLinkMode] = React.useState(false);
      const [linkUrl, setLinkUrl] = React.useState("");
      const savedRangeRef = React.useRef(null);

      React.useEffect(() => {
        const onSelectionChange = () => {
          const sel = document.getSelection();
          if (!sel || sel.rangeCount === 0 || sel.isCollapsed) {
            setState(prev => prev.visible ? { visible: false, top: 0, left: 0 } : prev);
            setLinkMode(false);
            return;
          }
          const range = sel.getRangeAt(0);
          const anchor = sel.anchorNode && (sel.anchorNode.nodeType === 1 ? sel.anchorNode : sel.anchorNode.parentElement);
          if (!anchor || !anchor.closest("[contenteditable='true']")) {
            setState(prev => prev.visible ? { visible: false, top: 0, left: 0 } : prev);
            return;
          }
          const rect = range.getBoundingClientRect();
          if (rect.width === 0 && rect.height === 0) return;
          savedRangeRef.current = range.cloneRange();
          setState({
            visible: true,
            top: rect.top - 40,
            left: rect.left + rect.width / 2 - 60,
          });
        };
        document.addEventListener("selectionchange", onSelectionChange);
        return () => document.removeEventListener("selectionchange", onSelectionChange);
      }, []);

      // Keyboard shortcuts Ctrl+B / Ctrl+I / Ctrl+K
      React.useEffect(() => {
        const onKey = (e) => {
          if (!state.visible && !(document.activeElement && document.activeElement.closest && document.activeElement.closest("[contenteditable='true']"))) return;
          if (!(e.ctrlKey || e.metaKey)) return;
          if (e.key.toLowerCase() === "b") { e.preventDefault(); captureCurrentRange(); document.execCommand("bold"); }
          if (e.key.toLowerCase() === "i") { e.preventDefault(); captureCurrentRange(); document.execCommand("italic"); }
          if (e.key.toLowerCase() === "k") { e.preventDefault(); captureCurrentRange(); openLinkMode(); }
        };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [state.visible]);

      const restoreSelection = () => {
        const sel = document.getSelection();
        if (savedRangeRef.current && sel) {
          sel.removeAllRanges();
          sel.addRange(savedRangeRef.current);
        }
      };

      const captureCurrentRange = () => {
        const sel = document.getSelection();
        if (sel && sel.rangeCount > 0) {
          savedRangeRef.current = sel.getRangeAt(0).cloneRange();
        }
      };

      const openLinkMode = () => {
        setLinkMode(true);
        setLinkUrl("");
      };
      const applyLink = () => {
        restoreSelection();
        if (linkUrl) {
          document.execCommand("createLink", false, linkUrl);
          const sel = document.getSelection();
          if (sel && sel.anchorNode) {
            const a = sel.anchorNode.parentElement && sel.anchorNode.parentElement.closest("a");
            if (a && linkUrl.match(/^https?:/)) {
              a.setAttribute("target", "_blank");
              a.setAttribute("rel", "noopener noreferrer");
            }
          }
        }
        setLinkMode(false);
        const active = document.activeElement;
        if (active && typeof active.blur === "function") active.blur();
      };

      if (!state.visible) return null;

      return (
        <div
          className="floating-rich-toolbar"
          style={{ top: state.top, left: state.left }}
          onMouseDown={(e) => e.preventDefault()}
        >
          {linkMode ? (
            <div className="link-input">
              <input
                autoFocus
                type="url"
                placeholder="https://..."
                value={linkUrl}
                onChange={(e) => setLinkUrl(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === "Enter") { e.preventDefault(); applyLink(); }
                  if (e.key === "Escape") { e.preventDefault(); setLinkMode(false); }
                }}
              />
              <button onClick={applyLink}>OK</button>
            </div>
          ) : (
            <React.Fragment>
              <button onClick={() => { captureCurrentRange(); document.execCommand("bold"); }} title="Bold (Ctrl+B)">B</button>
              <button onClick={() => { captureCurrentRange(); document.execCommand("italic"); }} title="Italic (Ctrl+I)"><i>I</i></button>
              <button onClick={() => { captureCurrentRange(); openLinkMode(); }} title="Link (Ctrl+K)">🔗</button>
            </React.Fragment>
          )}
        </div>
      );
    }

    // --- EditableSection (Task 7: drag + Task 8: insert gap + Task 11: settings) ---
    function EditableSection({ section, onSectionChange, token }) {
      const [dragIdx, setDragIdx] = React.useState(null);
      const [overIdx, setOverIdx] = React.useState(null);
      const [overPos, setOverPos] = React.useState(null); // "top" | "bottom"
      const [pickerAt, setPickerAt] = React.useState(null); // 삽입할 index (0=맨 앞)
      const [settingsIdx, setSettingsIdx] = React.useState(null); // Task 11: 설정 패널 열 블록 인덱스

      const moveBlock = (idx, delta) => {
        onSectionChange(prev => {
          const next = { ...prev, blocks: prev.blocks.slice() };
          const j = idx + delta;
          if (j < 0 || j >= next.blocks.length) return prev;
          [next.blocks[idx], next.blocks[j]] = [next.blocks[j], next.blocks[idx]];
          return next;
        }, { immediate: true });
      };
      const deleteBlock = (idx) => {
        onSectionChange(prev => ({
          ...prev,
          blocks: prev.blocks.filter((_, i) => i !== idx),
        }), { immediate: true });
      };
      const openSettings = (idx) => setSettingsIdx(idx);

      const insertBlockAt = (idx, type) => {
        // block 을 updater 밖에서 생성 — React 18/StrictMode 에서 updater 재실행 시 ID 불일치 방지
        const newBlock = createEmptyBlock(type);
        onSectionChange(prev => ({
          ...prev,
          blocks: [
            ...prev.blocks.slice(0, idx),
            newBlock,
            ...prev.blocks.slice(idx),
          ],
        }), { immediate: true });
        setPickerAt(null);
      };

      // picker / settings Escape 핸들러 effect 재등록 최소화
      const closePicker = React.useCallback(() => setPickerAt(null), []);
      const closeSettings = React.useCallback(() => setSettingsIdx(null), []);

      const renderSettingsPanel = () => {
        if (settingsIdx === null) return null;
        const block = section.blocks[settingsIdx];
        if (!block) return null;
        const onBlockChange = (updated, opts) => {
          onSectionChange(prev => ({
            ...prev,
            blocks: prev.blocks.map((b, i) => i === settingsIdx ? updated : b),
          }), opts);
        };
        switch (block.type) {
          case "image":    return <ImageBlockEdit    block={block} onChange={onBlockChange} token={token} onClose={closeSettings} />;
          case "youtube":  return <YoutubeBlockEdit  block={block} onChange={onBlockChange} token={token} onClose={closeSettings} />;
          case "button":   return <ButtonBlockEdit   block={block} onChange={onBlockChange}               onClose={closeSettings} />;
          case "cardgrid": return <CardgridBlockEdit block={block} onChange={onBlockChange} token={token} onClose={closeSettings} />;
          default:
            return (
              <SettingsPanel title={`${block.type} Block`} onClose={closeSettings}>
                <div style={{ fontSize: "0.85rem", color: "#a2a2a2" }}>
                  text / heading / list 은 본문 직접 클릭으로 편집합니다.
                </div>
              </SettingsPanel>
            );
        }
      };

      const handleDragStart = (idx) => (e) => {
        setDragIdx(idx);
        e.dataTransfer.effectAllowed = "move";
        // 섹션 ID 를 payload 에 실어 섹션 경계 차단에 사용
        e.dataTransfer.setData("text/plain", JSON.stringify({ section: section.id, idx }));
      };
      const handleDragOver = (idx) => (e) => {
        e.preventDefault();
        if (dragIdx === null || dragIdx === idx) { setOverIdx(null); return; }
        const rect = e.currentTarget.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const pos = e.clientY < midY ? "top" : "bottom";
        setOverIdx(idx);
        setOverPos(pos);
      };
      const handleDragLeave = () => {
        // leave 는 약식 처리 — overIdx 를 비워 아웃라인 제거. 잦은 flicker 는 다음 dragover 가 복구.
      };
      const handleDrop = (idx) => (e) => {
        e.preventDefault();
        if (dragIdx === null || dragIdx === idx) {
          setDragIdx(null); setOverIdx(null); setOverPos(null);
          return;
        }
        let targetIdx = idx;
        if (overPos === "bottom") targetIdx = idx + 1;
        // 자기 자신 다음으로 떨어지면 변동 없음 보정
        if (targetIdx > dragIdx) targetIdx -= 1;
        onSectionChange(prev => {
          const next = { ...prev, blocks: prev.blocks.slice() };
          const [moved] = next.blocks.splice(dragIdx, 1);
          next.blocks.splice(targetIdx, 0, moved);
          return next;
        }, { immediate: true });
        setDragIdx(null); setOverIdx(null); setOverPos(null);
      };
      const handleDragEnd = () => {
        setDragIdx(null); setOverIdx(null); setOverPos(null);
      };

      const headerTitle = (section.id || "SYSTEM").toUpperCase() + ".SYS";
      return (
        <div id={section.id} className="os-window">
          <div className="os-header">
            <span className="os-header-title">{headerTitle}</span>
            <div className="os-header-squares">
              <div className="os-square y"></div>
              <div className="os-square g"></div>
              <div className="os-square r"></div>
            </div>
          </div>
          <div className="os-body">
          <div style={{display: "flex", alignItems: "center", gap: 8, marginBottom: 4}}>
            {section.titleEmoji !== undefined && (
              <EditableInline
                value={section.titleEmoji || ""}
                rich={false}
                onCommit={(emoji) => onSectionChange(prev => ({ ...prev, titleEmoji: emoji || null }))}
              />
            )}
            <h2 className="pixel-font rpg-title text-2xl sm:text-3xl">
              <EditableInline
                value={section.title || ""}
                rich={false}
                onCommit={(title) => onSectionChange(prev => ({ ...prev, title }))}
              />
            </h2>
          </div>
          <p className="text-gray-400 italic mb-6">
            <EditableInline
              value={section.subtitle || ""}
              rich={false}
              onCommit={(subtitle) => onSectionChange(prev => ({ ...prev, subtitle: subtitle || null }))}
            />
          </p>
          <BlockInsertGap onInsert={() => setPickerAt(0)} />
          {section.blocks.map((block, idx) => (
            <React.Fragment key={block.id}>
              <BlockEditWrapper
                index={idx}
                lastIndex={section.blocks.length - 1}
                onMoveUp={() => moveBlock(idx, -1)}
                onMoveDown={() => moveBlock(idx, +1)}
                onDelete={() => deleteBlock(idx)}
                onSettings={() => openSettings(idx)}
                onDragStart={handleDragStart(idx)}
                onDragOver={handleDragOver(idx)}
                onDragLeave={handleDragLeave}
                onDrop={handleDrop(idx)}
                onDragEnd={handleDragEnd}
                isDragging={dragIdx === idx}
                dragOverPos={overIdx === idx ? overPos : null}
              >
                <EditableBlockContent
                  block={block}
                  onChange={(updated) => onSectionChange(prev => ({
                    ...prev,
                    blocks: prev.blocks.map((b, i) => i === idx ? updated : b),
                  }))}
                />
              </BlockEditWrapper>
              <BlockInsertGap onInsert={() => setPickerAt(idx + 1)} />
            </React.Fragment>
          ))}
          {pickerAt !== null && (
            <BlockTypePicker
              onPick={(type) => insertBlockAt(pickerAt, type)}
              onCancel={closePicker}
            />
          )}
          {renderSettingsPanel()}
          </div>
        </div>
      );
    }

    // --- PublishConfirmDialog (Plan C Task 12) ---
    function PublishConfirmDialog({ onConfirm, onCancel }) {
      const confirmRef = React.useRef(null);
      React.useEffect(() => {
        const onKey = (e) => {
          if (e.key === "Escape") { onCancel(); return; }
          if (e.key === "Enter" && document.activeElement === confirmRef.current) onConfirm();
        };
        document.addEventListener("keydown", onKey);
        if (confirmRef.current) confirmRef.current.focus();
        return () => document.removeEventListener("keydown", onKey);
      }, [onConfirm, onCancel]);
      return (
        <div className="publish-confirm-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onCancel(); }}>
          <div className="publish-confirm-box">
            <div className="title">포트폴리오를 게시하시겠습니까?</div>
            <div className="message">
              방문자에게 즉시 반영됩니다. Undo 로 되돌릴 수 있습니다.
            </div>
            <div className="btns">
              <button className="btn-cancel" onClick={onCancel}>취소</button>
              <button ref={confirmRef} className="btn-confirm" onClick={onConfirm}>🚀 Publish</button>
            </div>
          </div>
        </div>
      );
    }

    // --- HistoryDropdown (Plan C Task 13) ---
    function formatSnapshotTs(ts) {
      if (!ts) return "(시간 미상)";
      const d = new Date(ts);
      if (isNaN(d.getTime())) return String(ts);
      return d.toLocaleString();
    }

    function HistoryDropdown({ token, onRestore, onClose }) {
      const [snapshots, setSnapshots] = React.useState(null); // null = loading
      const [error, setError] = React.useState(null);
      const [confirmTs, setConfirmTs] = React.useState(null);
      const [restoring, setRestoring] = React.useState(false);
      const confirmTsRef = React.useRef(null);
      // confirmTs 변경 시 ref 동기화 — ESC 핸들러 stale closure 방지
      React.useEffect(() => { confirmTsRef.current = confirmTs; }, [confirmTs]);

      const loadList = React.useCallback(() => {
        setError(null);
        setSnapshots(null);
        fetchPortfolioHistoryList(token)
          .then(data => {
            const list = Array.isArray(data) ? data : (data.items || []);
            setSnapshots(list);
          })
          .catch(e => setError(e.message));
      }, [token]);

      React.useEffect(() => { loadList(); }, [loadList]);

      React.useEffect(() => {
        const onKey = (e) => {
          if (e.key !== "Escape") return;
          // confirm 서브 모달이 열려있으면 서브 모달만 닫음
          if (confirmTsRef.current) { setConfirmTs(null); return; }
          onClose();
        };
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [onClose]);

      const doRestore = async (timestamp) => {
        setRestoring(true);
        try {
          const content = await fetchPortfolioHistoryItem(token, timestamp);
          onRestore(content);
        } catch (e) {
          setError(`복원 실패: ${e.message}`);
        } finally {
          setRestoring(false);
          setConfirmTs(null);
        }
      };

      return (
        <div className="history-dropdown-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="history-dropdown">
            <div className="title">이전 버전 복원</div>
            {snapshots === null && !error && <div className="empty">불러오는 중...</div>}
            {error && (
              <div className="error">
                {error}
                <button className="retry" onClick={loadList}>재시도</button>
              </div>
            )}
            {snapshots && snapshots.length === 0 && (
              <div className="empty">저장된 스냅샷이 없습니다.</div>
            )}
            {snapshots && snapshots.length > 0 && (
              <ul className="snapshot-list">
                {snapshots.map((snap, idx) => {
                  const ts = snap.timestamp || snap.ts || snap.key || "";
                  return (
                    <li key={ts || idx}>
                      <button onClick={() => setConfirmTs(ts)} disabled={restoring}>
                        <span className="ts">{formatSnapshotTs(ts)}</span>
                      </button>
                    </li>
                  );
                })}
              </ul>
            )}
            <button className="close" onClick={onClose}>닫기</button>
          </div>
          {confirmTs && (
            <div className="publish-confirm-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setConfirmTs(null); }}>
              <div className="publish-confirm-box">
                <div className="title">현재 draft 덮어쓰기</div>
                <div className="message">
                  {formatSnapshotTs(confirmTs)} 스냅샷으로 덮어쓸까요? 현재 작업은 Undo 로 되돌릴 수 있습니다.
                </div>
                <div className="btns">
                  <button className="btn-cancel" onClick={() => setConfirmTs(null)} disabled={restoring}>취소</button>
                  <button className="btn-confirm" onClick={() => doRestore(confirmTs)} disabled={restoring}>
                    {restoring ? "..." : "복원"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- EditToolbar (Plan C Task 5: Undo/Redo + 배지 + History/Export + Publish confirm) ---
    function EditToolbar({
      dirty, savingState, savedAt,
      onFlushAndWait, onPublish, onExit, onLogout,
      canUndo, canRedo, onUndo, onRedo,
      hasUnpublishedChanges,
      content, token, onRestore,
    }) {
      const [publishing, setPublishing] = React.useState(false);
      const [publishMsg, setPublishMsg] = React.useState(null);
      const [confirmOpen, setConfirmOpen] = React.useState(false); // Task 12 에서 PublishConfirmDialog 로 연결
      const [historyOpen, setHistoryOpen] = React.useState(false); // Task 13 에서 HistoryDropdown 으로 연결

      React.useEffect(() => {
        if (!publishMsg || publishMsg.startsWith("게시 완료") === false) return;
        const t = setTimeout(() => setPublishMsg(null), 2000);
        return () => clearTimeout(t);
      }, [publishMsg]);

      const statusClass =
        savingState === "error" ? "status error"
        : dirty || savingState === "saving" ? "status dirty"
        : "status";
      const statusText =
        savingState === "saving" ? "저장 중..."
        : savingState === "error" ? "저장 실패 (재시도 대기)"
        : dirty ? "변경 사항 있음"
        : savedAt ? `저장됨 · ${new Date(savedAt).toLocaleTimeString()}`
        : "변경 없음";

      const doPublish = async () => {
        setPublishing(true);
        setPublishMsg(null);
        try {
          if (dirty) await onFlushAndWait();
          await onPublish();
          setPublishMsg("게시 완료");
        } catch (e) {
          if (e.message === "UNAUTHORIZED") {
            setPublishMsg(`인증 만료 — 다시 로그인 필요`);
          } else {
            setPublishMsg(`게시 실패: ${e.message}`);
          }
        } finally {
          setPublishing(false);
        }
      };

      const handlePublishClick = () => {
        setConfirmOpen(true); // Task 12 에서 PublishConfirmDialog 로 연결 — 현재는 confirmOpen=true 만 세팅
      };
      const handleConfirmPublish = () => {
        setConfirmOpen(false);
        doPublish();
      };
      const handleCancelPublish = () => setConfirmOpen(false);

      // JSON Export — Task 14 에서 검증만 수행 (본 Task 5 에서 실구현)
      const handleExport = () => {
        if (!content) return; // 로딩 중에 눌렸을 때 "undefined" 문자열 파일 방지
        const blob = new Blob([JSON.stringify(content, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob); // blob: 스킴 — safeHref 불필요
        const a = document.createElement("a");
        const ts = new Date();
        const pad = (n) => String(n).padStart(2, "0");
        const fname = `portfolio-draft-${ts.getFullYear()}${pad(ts.getMonth() + 1)}${pad(ts.getDate())}-${pad(ts.getHours())}${pad(ts.getMinutes())}.json`;
        a.href = url;
        a.download = fname;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setPublishMsg("💾 내보냄. repo 에 수동 commit 하면 git 이력 확보 가능");
        setTimeout(() => setPublishMsg(null), 4000);
      };

      return (
        <React.Fragment>
          <div className="edit-toolbar-sticky">
            <span className="badge">편집 중</span>
            <button
              className="toolbar-btn"
              onClick={onUndo}
              disabled={!canUndo}
              title="실행 취소 (Ctrl+Z)"
              aria-label="실행 취소"
            >⟲</button>
            <button
              className="toolbar-btn"
              onClick={onRedo}
              disabled={!canRedo}
              title="다시 실행 (Ctrl+Shift+Z)"
              aria-label="다시 실행"
            >⟳</button>
            <span className={statusClass}>
              {publishMsg || statusText}
            </span>
            {hasUnpublishedChanges && (
              <span className="unpublished-badge" title="Publish 후 변경이 있습니다">
                ⚠ 미게시 변경
              </span>
            )}
            <button
              className="toolbar-btn"
              onClick={handleExport}
              title="JSON 내보내기"
              aria-label="JSON 내보내기"
            >📥 JSON</button>
            <button
              className="toolbar-btn"
              onClick={() => setHistoryOpen(h => !h)}
              title="이전 버전 복원"
              aria-label="이전 버전"
            >⋯ History</button>
            <button onClick={handlePublishClick} className="btn-publish" disabled={publishing || savingState === "saving"}>
              {publishing ? "..." : "🚀 Publish"}
            </button>
            <button onClick={onExit}>Cancel</button>
            <button onClick={onLogout} style={{ borderColor: "#ef4444", color: "#ef4444" }}>LogOut</button>
          </div>
          {confirmOpen && (
            <PublishConfirmDialog
              onConfirm={handleConfirmPublish}
              onCancel={handleCancelPublish}
            />
          )}
          {historyOpen && (
            <HistoryDropdown
              token={token}
              onRestore={(restored) => {
                onRestore(restored);
                setHistoryOpen(false);
                setPublishMsg("복원 완료. Undo 로 되돌릴 수 있습니다.");
                setTimeout(() => setPublishMsg(null), 3000);
              }}
              onClose={() => setHistoryOpen(false)}
            />
          )}
        </React.Fragment>
      );
    }

    // --- PortfolioEditView ---
    // --- EditableProfileSection ---
    const STATUS_COLORS = ["yellow-300", "yellow-400", "green-400", "blue-400", "gray-300", "gray-400"];
    function EditableProfileSection({ profile, onChange, token }) {
      const fileRef = React.useRef(null);
      const [uploading, setUploading] = React.useState(false);

      const handleImgFile = async (file) => {
        if (!file) return;
        setUploading(true);
        try {
          const data = await uploadPortfolioImage(token, file);
          onChange({ ...profile, imageUrl: data.url }, { immediate: true });
        } catch (e) {
          alert(`프로필 이미지 업로드 실패: ${e.message}`);
        } finally {
          setUploading(false);
        }
      };

      // Status CRUD
      const updateStatus = (i, patch, opts) => {
        const next = profile.status.map((s, idx) => idx === i ? { ...s, ...patch } : s);
        onChange({ ...profile, status: next }, opts);
      };
      const addStatus = () => {
        onChange({ ...profile, status: [...profile.status, { label: "New", labelColor: "yellow-300", value: "" }] }, { immediate: true });
      };
      const removeStatus = (i) => {
        onChange({ ...profile, status: profile.status.filter((_, idx) => idx !== i) }, { immediate: true });
      };

      // Inventory CRUD
      const updateInv = (i, patch, opts) => {
        const next = profile.inventory.map((it, idx) => idx === i ? { ...it, ...patch } : it);
        onChange({ ...profile, inventory: next }, opts);
      };
      const addInv = () => {
        onChange({ ...profile, inventory: [...profile.inventory, { icon: "link", label: "New", href: "#", target: "_self" }] }, { immediate: true });
      };
      const removeInv = (i) => {
        onChange({ ...profile, inventory: profile.inventory.filter((_, idx) => idx !== i) }, { immediate: true });
      };

      return (
        <div className="os-window">
          <div className="os-header">
            <span className="os-header-title">USER_PROFILE.EXE</span>
            <div className="os-header-squares">
              <div className="os-square y"></div>
              <div className="os-square g"></div>
              <div className="os-square r"></div>
            </div>
          </div>
          <div className="os-body">
            <div className="flex flex-col md:flex-row gap-8">
            <div className="flex-shrink-0">
              <img
                src={profile.imageUrl}
                alt={profile.imageAlt || "Profile"}
                style={{
                  width: `${profile.imageWidth || 280}px`,
                  height: "auto",
                  border: "4px solid var(--win-highlight)",
                  borderRadius: "2px",
                }}
              />
              <div style={{ textAlign: "center", marginTop: 8 }}>
                <button
                  className="profile-image-replace"
                  onClick={() => fileRef.current && fileRef.current.click()}
                  disabled={uploading}
                >
                  {uploading ? "업로드 중..." : "이미지 교체"}
                </button>
                <input
                  ref={fileRef}
                  type="file"
                  accept="image/*"
                  style={{ display: "none" }}
                  onChange={(e) => handleImgFile(e.target.files && e.target.files[0])}
                />
              </div>
            </div>
            <div className="flex-1 w-full">
              {/* Status */}
              <h2 className="pixel-font text-xl md:text-2xl rpg-title">{profile.statusTitle || "Status"}</h2>
              {profile.status.map((s, i) => (
                <div key={i} className="profile-edit-row">
                  <div className="label-col" style={{ display: "flex", gap: 4 }}>
                    <input
                      type="text"
                      value={s.label || ""}
                      onChange={(e) => updateStatus(i, { label: e.target.value })}
                      placeholder="라벨"
                    />
                    <select
                      value={s.labelColor || "yellow-300"}
                      onChange={(e) => updateStatus(i, { labelColor: e.target.value }, { immediate: true })}
                      title="라벨 색상"
                    >
                      {STATUS_COLORS.map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="value-col">
                    <input
                      type="text"
                      value={s.value || ""}
                      onChange={(e) => updateStatus(i, { value: e.target.value })}
                      placeholder="값"
                    />
                  </div>
                  <button className="remove" onClick={() => removeStatus(i)} aria-label="항목 삭제">🗑</button>
                </div>
              ))}
              <button className="profile-edit-add" onClick={addStatus}>+ Status 항목 추가</button>

              {/* Inventory */}
              <div style={{ borderTop: "2px dashed var(--win-border)", marginTop: "16px", paddingTop: "16px" }}>
                <h3 className="pixel-font text-lg text-yellow-400 mb-6">{profile.inventoryTitle || "Inventory"}</h3>
                {profile.inventory.map((it, i) => (
                  <div key={i} className="profile-edit-row">
                    <div className="label-col">
                      <select
                        value={it.icon || "link"}
                        onChange={(e) => updateInv(i, { icon: e.target.value }, { immediate: true })}
                      >
                        {Object.keys(ICON_PATHS).map(k => <option key={k} value={k}>{k}</option>)}
                      </select>
                    </div>
                    <div className="value-col" style={{ display: "flex", gap: 4 }}>
                      <input
                        type="text"
                        value={it.label || ""}
                        onChange={(e) => updateInv(i, { label: e.target.value })}
                        placeholder="라벨"
                      />
                      <input
                        type="text"
                        value={it.href || ""}
                        onChange={(e) => updateInv(i, { href: e.target.value })}
                        placeholder="링크"
                      />
                      <select
                        value={it.target || "_self"}
                        onChange={(e) => updateInv(i, { target: e.target.value }, { immediate: true })}
                      >
                        <option value="_self">_self</option>
                        <option value="_blank">_blank</option>
                      </select>
                    </div>
                    <button className="remove" onClick={() => removeInv(i)} aria-label="항목 삭제">🗑</button>
                  </div>
                ))}
                <button className="profile-edit-add" onClick={addInv}>+ Inventory 항목 추가</button>
              </div>
            </div>
          </div>
          </div>
        </div>
      );
    }

    // --- EditableHeader ---
    function EditableHeader({ header, onChange }) {
      return (
        <header className="text-center mt-10 mb-16">
          <h1 className="pixel-font text-3xl md:text-4xl text-yellow-400 mb-4 tracking-wider">
            <EditableInline
              value={header.title || ""}
              rich={false}
              onCommit={(title) => onChange({ ...header, title })}
            />
          </h1>
          <p className="pixel-font text-lg text-green-400">
            <EditableInline
              value={header.subtitle || ""}
              rich={false}
              onCommit={(subtitle) => onChange({ ...header, subtitle })}
            />
          </p>
        </header>
      );
    }

    // --- EditableFooter ---
    function EditableFooter({ footer, onChange }) {
      return (
        <footer className="text-center text-gray-500 text-sm mt-12 mb-8 pixel-font">
          <EditableInline
            value={footer.text || ""}
            rich={false}
            onCommit={(text) => onChange({ ...footer, text })}
          />
        </footer>
      );
    }

    function PortfolioEditView({ token, onExit, onLogout }) {
      const {
        content, setContent, replaceContent,
        dirty, savedAt, savingState, flushAndWait, loadError,
        undo, redo, canUndo, canRedo,
        hasUnpublishedChanges, markPublished,
        flushPending,
      } = useEditContent(token);

      const onKeyDownCapture = useEditorKeyboard({ undo, redo, canUndo, canRedo });

      React.useEffect(() => {
        if (loadError === "UNAUTHORIZED") {
          clearAdminToken();
          onExit();
        }
      }, [loadError, onExit]);

      const handlePublish = React.useCallback(async () => {
        try {
          const result = await publishPortfolio(token);
          markPublished();
          return result;
        } catch (e) {
          if (e.message === "UNAUTHORIZED") {
            clearAdminToken();
            onExit();
          }
          throw e;
        }
      }, [token, onExit, markPublished]);

      // --- beforeunload flush + leave-guard (Plan C Task 6) ---
      // pending history commit + dirty 일 때 브라우저 leave-guard 대화상자 트리거.
      // sendBeacon 은 Worker 가 Authorization: Bearer 헤더를 요구하여 사용 불가 —
      // 토큰을 쿼리로 전달하는 건 보안 회귀이므로 본 스코프 내에서는 브라우저 경고만.
      // dirtyRef 로 읽어서 리스너 churn 방지 (dirty 가 deps 에 있으면 매 편집 flip 마다
      // removeEventListener + addEventListener 반복).
      const dirtyRef = React.useRef(dirty);
      React.useEffect(() => { dirtyRef.current = dirty; }, [dirty]);
      React.useEffect(() => {
        const handler = (e) => {
          try { flushPending(); } catch (_) {}
          if (dirtyRef.current) {
            e.preventDefault();
            e.returnValue = ""; // Chrome/Edge/Firefox
            return ""; // Safari 호환 — 오래된 WebKit 이 return 값을 확인
          }
        };
        window.addEventListener("beforeunload", handler);
        return () => window.removeEventListener("beforeunload", handler);
      }, [flushPending]);

      const handleExit = () => {
        if (dirty) {
          if (!window.confirm("미저장 변경이 있습니다. 나갈까요?")) return;
        }
        onExit();
      };

      // 모든 hook 호출 후에 render guard — hook order 유지
      if (loadError === "UNAUTHORIZED") return null;

      return (
        <div className="edit-mode-root" onKeyDownCapture={onKeyDownCapture} tabIndex={-1}>
          <EditToolbar
            dirty={dirty}
            savingState={savingState}
            savedAt={savedAt}
            onFlushAndWait={flushAndWait}
            onPublish={handlePublish}
            onExit={handleExit}
            onLogout={onLogout}
            canUndo={canUndo}
            canRedo={canRedo}
            onUndo={undo}
            onRedo={redo}
            hasUnpublishedChanges={hasUnpublishedChanges}
            content={content}
            token={token}
            onRestore={replaceContent}
          />
          <div style={{ maxWidth: "1100px", position: "relative", zIndex: 1 }} className="mx-auto p-4 sm:p-8">
            <EditableHeader
              header={content.header}
              onChange={(h, opts) => setContent(prev => ({ ...prev, header: h }), opts)}
            />
            <EditableProfileSection
              profile={content.profile}
              token={token}
              onChange={(p, opts) => setContent(prev => ({ ...prev, profile: p }), opts)}
            />
            {content.sections.map((section, sIdx) => (
              <EditableSection
                key={section.id}
                section={section}
                token={token}
                onSectionChange={(updater, opts) => setContent(prev => ({
                  ...prev,
                  sections: prev.sections.map((s, i) => i === sIdx ? (typeof updater === "function" ? updater(s) : updater) : s),
                }), opts)}
              />
            ))}
            <EditableFooter
              footer={content.footer}
              onChange={(f, opts) => setContent(prev => ({ ...prev, footer: f }), opts)}
            />
          </div>
          <FloatingRichTextToolbar />
        </div>
      );
    }

    ReactDOM.render(<Portfolio />, document.getElementById('root'));
  </script>
</body>
</html>
