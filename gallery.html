<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Kim Jong-il Portfolio</title>

  <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <!-- FOUC 방지: 포트폴리오와 동일 localStorage 키 공유 -->
  <script>
    (function(){
      var t = localStorage.getItem('portfolio-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <style>
    /* === Base === */
    body {
      font-family: 'Gowun Dodum', sans-serif;
      background-color: #111;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      font-size: 1.15rem;
      line-height: 1.6;
    }
    button, input, select, textarea {
      font-family: inherit;
    }
    .pixel-font {
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      line-height: 1.5;
    }

    /* === Gallery Header (OS-Retro 테마) === */
    .gallery-header {
      background-color: #000;
      border-bottom: 3px solid #4a4a6a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
    }
    .gallery-header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 1;
    }
    .back-link {
      color: #ffcc00;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 0.7rem;
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #00ffcc;
    }
    .gallery-title {
      color: #ffcc00;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 1rem;
    }
    .cat-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .cat-tab {
      background: transparent;
      border: 2px solid #374151;
      color: #9ca3af;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 0.85rem;
      padding: 5px 13px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
    }
    .cat-tab:hover {
      border-color: #00ffcc;
      color: #00ffcc;
    }
    .cat-tab.active {
      background-color: transparent;
      color: #00ffcc;
      border-color: #00ffcc;
    }
    .header-settings-btn {
      background: transparent;
      border: none;
      color: #4a4a6a;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .header-settings-btn:hover {
      color: #ffcc00;
    }

    /* === Gallery Header Light Theme === */
    [data-theme="light"] .gallery-header {
      background-color: #e5e7eb;
      border-bottom-color: #9ca3af;
    }
    [data-theme="light"] .gallery-header::after {
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
      background-size: 100% 4px;
    }
    [data-theme="light"] .back-link {
      color: #b45309;
    }
    [data-theme="light"] .back-link:hover {
      color: #047857;
    }
    [data-theme="light"] .gallery-title {
      color: #92400e;
    }
    [data-theme="light"] .cat-tab {
      border-color: #9ca3af;
      color: #4b5563;
    }
    [data-theme="light"] .cat-tab:hover {
      border-color: #047857;
      color: #047857;
    }
    [data-theme="light"] .cat-tab.active {
      color: #047857;
      border-color: #047857;
    }
    [data-theme="light"] .header-settings-btn {
      color: #6b7280;
    }
    [data-theme="light"] .header-settings-btn:hover {
      color: #b45309;
    }
    [data-theme="light"] .header-edit-btn {
      color: #6b7280;
    }
    .gallery-theme-toggle {
      background: #b0b0b0;
      color: #1a1a1a;
      border: 2px solid #ffffff;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 0.6rem;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: 2px;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
      transition: all 0.15s;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .gallery-theme-toggle:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px rgba(0,0,0,0.5);
    }
    .gallery-theme-toggle::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.4) 0px,
        rgba(0, 0, 0, 0.4) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 5;
      animation: scanlineScroll 12s linear infinite;
    }
    @keyframes scanlineScroll {
      from { background-position: 0 0; }
      to { background-position: 0 100%; }
    }
    [data-theme="light"] .gallery-theme-toggle {
      background: #374151;
      color: #ffffff;
      border-color: #374151;
    }
    [data-theme="light"] .gallery-theme-toggle::after {
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 2px,
        transparent 2px,
        transparent 4px
      );
    }

    /* === Masonry Grid === */
    .masonry {
      column-count: 4;
      column-gap: 8px;
      max-width: 1400px;
      margin: 24px auto;
      padding: 0 16px;
    }
    @media (max-width: 1100px) {
      .masonry { column-count: 3; }
    }
    @media (max-width: 750px) {
      .masonry { column-count: 2; }
    }
    @media (max-width: 480px) {
      .masonry { column-count: 1; }
    }
    .masonry-item {
      break-inside: avoid;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border-radius: 4px;
      margin-bottom: 8px;
      display: inline-block;
      width: 100%;
    }
    .masonry-item img {
      width: 100%;
      display: block;
      transition: filter 0.25s;
      -webkit-user-drag: none;
      user-select: none;
      pointer-events: none;
    }
    .masonry-item { pointer-events: auto; }
    .masonry-item:hover img {
      filter: brightness(1.15);
    }
    .masonry-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 10px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .masonry-item:hover .masonry-overlay {
      opacity: 1;
    }
    .masonry-overlay-title {
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 0.55rem;
      color: #f1c40f;
      margin-bottom: 2px;
    }
    .masonry-overlay-project {
      font-size: 0.75rem;
      color: #b2bec3;
    }
    .masonry-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      color: #f1c40f;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 0.55rem;
      padding: 3px 7px;
      border-radius: 3px;
      pointer-events: none;
    }

    /* === Edit Mode (inline reorder) === */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .header-edit-btn {
      background: transparent;
      border: none;
      color: #636e72;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .header-edit-btn:hover {
      color: #f1c40f;
    }
    @media (max-width: 750px) {
      .header-edit-btn { display: none; }
      .cat-tabs { display: none; }
      .gallery-theme-toggle { display: none; }
      .header-settings-btn { display: none; }
    }

    .edit-mode-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1d23;
      border-bottom: 2px solid #f1c40f;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 0.55rem;
      color: #f1c40f;
    }
    .edit-mode-bar-status { flex: 1; }
    .edit-mode-bar-buttons { display: flex; gap: 8px; }
    .edit-mode-bar button {
      background: transparent;
      border: 1px solid #f1c40f;
      color: #f1c40f;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 0.55rem;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }
    .edit-mode-bar button:hover { background: #f1c40f; color: #1a1d23; }
    .edit-mode-bar button.primary { background: #f1c40f; color: #1a1d23; }
    .edit-mode-bar button.primary:hover { background: #ffdb4d; }

    .masonry-item.editable { cursor: grab; }
    .masonry-item.editable:active { cursor: grabbing; }
    .masonry-item.editable .drag-handle {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0,0,0,0.75);
      color: #f1c40f;
      font-size: 0.9rem;
      padding: 3px 6px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      letter-spacing: -1px;
      z-index: 5;
    }
    .masonry-item.editable:hover .drag-handle { opacity: 1; }
    .masonry-item.dragging {
      transform: rotate(3deg) scale(0.98);
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      opacity: 0.9;
      transition: transform 0.1s;
    }
    .masonry-item.drop-target {
      outline: 2px solid #f1c40f;
      outline-offset: 2px;
    }
    .cat-tab:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* === Lightbox === */
    .lightbox-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .lightbox-carousel {
      display: flex;
      width: 100%;
      max-width: 1400px;
      overflow: visible;
      align-items: center;
    }
    .lightbox-peek {
      flex: 0 0 12%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.4;
      overflow: hidden;
      cursor: pointer;
    }
    .lightbox-peek img {
      max-height: 85vh;
      object-fit: contain;
      width: 100%;
      -webkit-user-drag: none;
      user-select: none;
    }
    .lightbox-slide {
      flex: 0 0 76%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      transition: transform 0.35s ease;
    }
    .lightbox-slide img {
      width: 108%;
      margin-left: -4%;
      max-height: 88vh;
      object-fit: contain;
      -webkit-user-drag: none;
      user-select: none;
    }
    .lightbox-info {
      max-width: 1400px;
      padding: 8px 16px 4px;
      text-align: center;
    }
    .lightbox-info-title {
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      color: #f1c40f;
      font-size: 0.75rem;
      margin-bottom: 4px;
    }
    .lightbox-info-meta {
      color: #b2bec3;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }
    .lightbox-info-desc {
      color: #888;
      font-size: 0.85rem;
    }
    .lightbox-close {
      position: fixed;
      top: 16px;
      right: 24px;
      color: white;
      font-size: 2rem;
      z-index: 1001;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }
    .lightbox-close:hover {
      color: #f1c40f;
    }
    .lightbox-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 4px;
      margin-bottom: 4px;
    }
    .lightbox-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .lightbox-dot.active {
      background: #f1c40f;
    }

    /* === Password Modal === */
    .password-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .password-box {
      background: #222;
      border: 2px solid #f1c40f;
      padding: 32px;
      border-radius: 4px;
      min-width: 300px;
      text-align: center;
    }
    .password-box input {
      width: 100%;
      padding: 10px;
      margin: 16px 0;
      background: #111;
      border: 2px solid #636e72;
      color: #e0e0e0;
      font-size: 1rem;
      border-radius: 2px;
      box-sizing: border-box;
    }
    .password-box input:focus {
      outline: none;
      border-color: #f1c40f;
    }
    .password-box-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .password-box button {
      padding: 10px 24px;
      font-family: 'Press Start 2P', 'Gowun Dodum', sans-serif;
      font-size: 1.2rem;
      cursor: pointer;
      border-radius: 2px;
      border: 2px solid;
      transition: 0.15s;
    }
    .password-box .btn-enter {
      background: #f1c40f;
      color: #000;
      border-color: #f1c40f;
    }
    .password-box .btn-enter:hover {
      background: #d4ac0d;
    }
    .password-box .btn-cancel {
      background: transparent;
      color: #b2bec3;
      border-color: #636e72;
    }
    .password-box .btn-cancel:hover {
      border-color: #f1c40f;
    }

    /* === Admin Panel — Single Flow Layout === */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #111;
      border-bottom: 2px solid #636e72;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-layout {
      display: flex;
      height: calc(100vh - 46px);
      overflow: hidden;
    }

    /* --- Left Panel (420px) --- */
    .admin-left {
      width: 420px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-right: 1px solid #636e72;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Zone B: Upload */
    .admin-upload-zone {
      padding: 8px;
      border-bottom: 1px solid #636e72;
    }
    .admin-upload-droparea {
      border: 2px dashed #636e72;
      border-radius: 6px;
      padding: 16px 8px;
      text-align: center;
      color: #888;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .admin-upload-droparea.drag-over {
      border-color: #f1c40f;
      background: rgba(241,196,15,0.05);
    }
    .admin-upload-progress {
      margin-top: 6px;
      background: #222;
      border-radius: 4px;
      padding: 6px;
      border: 1px solid #636e72;
    }
    .admin-upload-file {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      border-radius: 4px;
      margin-bottom: 3px;
      font-size: 0.85rem;
    }
    .admin-upload-file.done { background: #1a2a1a; }
    .admin-upload-file.uploading { background: #222; border: 1px solid #f1c40f; }
    .admin-upload-file.queued { opacity: 0.6; }
    .admin-upload-file.failed { background: #3a1a1a; border: 1px solid #c44; }
    .admin-upload-file-thumb {
      width: 28px;
      height: 28px;
      object-fit: cover;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .admin-progress-bar {
      flex: 1;
      background: #333;
      height: 3px;
      border-radius: 2px;
      overflow: hidden;
    }
    .admin-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .admin-progress-fill.gold { background: #f1c40f; }
    .admin-progress-fill.green { background: #4CAF50; }

    /* Zone C: Image Pool */
    .admin-pool {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .admin-pool-header {
      padding: 6px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: #888;
    }
    .admin-pool-search {
      margin: 0 8px 6px;
      padding: 5px 8px;
      background: #222;
      border: 1px solid #636e72;
      border-radius: 4px;
      color: #ccc;
      font-size: 0.95rem;
      width: calc(100% - 16px);
      box-sizing: border-box;
    }
    .admin-pool-search:focus {
      outline: none;
      border-color: #f1c40f;
    }
    .admin-pool-grid {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      align-content: start;
    }
    .admin-pool-item {
      aspect-ratio: 1;
      border-radius: 3px;
      overflow: hidden;
      cursor: grab;
      position: relative;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .admin-pool-item:hover {
      transform: scale(1.05);
      border-color: #888;
    }
    .admin-pool-item.dragging {
      opacity: 0.4;
    }
    .admin-pool-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .admin-pool-item .pool-actions {
      position: absolute;
      top: 2px;
      right: 2px;
      display: none;
      gap: 2px;
    }
    .admin-pool-item:hover .pool-actions {
      display: flex;
    }
    .pool-action-btn {
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 0.6rem;
      padding: 2px 4px;
      cursor: pointer;
    }

    /* Zone D: Group Panel (right side) */
    .admin-groups-panel {
      width: 320px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-left: 1px solid #636e72;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .admin-groups-panel-header {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #222;
      border-bottom: 1px solid #636e72;
      flex-shrink: 0;
      font-size: 0.9rem;
      color: #888;
    }
    .admin-groups-grid {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      align-content: start;
    }
    .admin-group-card {
      padding: 8px;
      background: #222;
      border: 2px solid #636e72;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .admin-group-card:hover {
      border-color: #888;
    }
    .admin-group-card.selected {
      background: #2a2a2a;
      border-color: #f1c40f;
    }
    .admin-group-card.drag-over {
      background: rgba(241,196,15,0.1);
      border: 2px dashed #f1c40f;
    }
    .admin-group-card.drop-flash {
      border-color: #4CAF50;
      transition: border-color 0s;
    }

    /* --- Center Panel (flex) --- */
    .admin-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #222;
      min-width: 0;
      overflow: hidden;
    }
    .admin-right-header {
      padding: 10px 16px;
      background: #222;
      border-bottom: 1px solid #636e72;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .admin-right-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .admin-right-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #636e72;
      font-size: 0.9rem;
    }

    /* Section labels */
    .admin-section-label {
      font-size: 0.85rem;
      color: #f1c40f;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* Save status indicator */
    .save-status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
    }
    .save-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;

    .save-status-dot.saved { background: #4CAF50; }

    .save-status-dot.saving {
      border: 2px solid #888;
      border-top-color: transparent;
      animation: spin 0.8s linear infinite;

    /* Admin input/button refinements */

    /* Image cards in group detail */

    .admin-image-card-thumb {

    /* Drag insert marker */

    /* Inline Crop Editor */

    .admin-crop-canvas-wrap {

    .admin-crop-canvas-wrap img {

    .crop-guide-line {
      position: absolute;

    .crop-center-h, .crop-center-v {

    .crop-controls {

    .crop-preview-box {
      width: 100%;
      aspect-ratio: 4/3;

      border-radius: 2px;

    /* Admin card (section wrapper) */
    .admin-card {

    /* === Toast Notifications === */
    .toast-container {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 500;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      max-width: 380px;
    }
    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 6px;
      border-left: 4px solid;
      font-size: 0.85rem;
      animation: toastIn 0.3s ease;
      position: relative;
    }
    .toast-success {
      background: #1a3a1a;
      border-color: #4CAF50;
      color: #4CAF50;
    }
    .toast-error {
      background: #3a1a1a;
      border-color: #CC4444;
      color: #CC4444;
    }
    .toast-warning {
      background: #3a3a1a;
      border-color: #f1c40f;
      color: #f1c40f;
    }
    .toast-icon {
      font-size: 1rem;
      flex-shrink: 0;
    }
    .toast-body {
      flex: 1;
      min-width: 0;
    }
    .toast-title {
      font-weight: bold;
      font-size: 0.8rem;
      margin-bottom: 1px;
    }
    .toast-message {
      font-size: 0.75rem;
      opacity: 0.85;
    }
    .toast-close {
      background: none;
      border: none;
      color: inherit;
      opacity: 0.5;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      flex-shrink: 0;
    }
    .toast-close:hover {
      opacity: 1;
    }
    @keyframes toastIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    /* === Loading spinner === */
    .loading-spinner {
      text-align: center;
      padding: 80px 0;
      color: #636e72;
    }
    .loading-spinner::after {
      content: '';
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #636e72;
      border-top-color: #f1c40f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* === Empty state === */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #636e72;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // === API Client ===
    const API_BASE = "https://kji-gallery-api.blueitems7.workers.dev";

    function api(path, opts = {}) {
      const headers = { ...opts.headers };
      const token = sessionStorage.getItem("admin_token");
      if (token) headers["Authorization"] = "Bearer " + token;
      if (opts.json) {
        headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(opts.json);
        delete opts.json;
      }
      return fetch(API_BASE + path, { ...opts, headers }).then(r => r.json());
    }

    // === Cloudinary URL Builders ===
    function thumbUrl(cloudName, publicId, crop, maxW) {
      if (!maxW) maxW = 600;
      const base = "https://res.cloudinary.com/" + cloudName + "/image/upload";
      let transforms = "";
      if (crop && crop.width && crop.height) {
        transforms += "/c_crop,x_" + crop.x + ",y_" + crop.y + ",w_" + crop.width + ",h_" + crop.height;
      }
      transforms += "/c_fill,w_" + maxW + ",q_auto,f_auto";
      return base + transforms + "/" + publicId;
    }

    function fullUrl(cloudName, publicId) {
      return "https://res.cloudinary.com/" + cloudName + "/image/upload/c_limit,w_1920,q_auto,f_auto/" + publicId;
    }

    // === Components ===

    function GalleryHeader({ categories, activeCategory, onCategoryChange, editMode, showEditBtn, onEnterEdit, theme, toggleTheme }) {
      return (
        <div className="gallery-header">
          <a href="index.html" className="back-link">&larr; Portfolio</a>
          <span className="gallery-title">Kim Jong-il Gallery</span>
          <div className="cat-tabs">
            <button
              className={"cat-tab" + (activeCategory === "all" ? " active" : "")}
              onClick={() => onCategoryChange("all")}
              disabled={editMode}
            >
              ALL
            </button>
            {categories.map(cat => (
              <button
                key={cat}
                className={"cat-tab" + (activeCategory === cat ? " active" : "")}
                onClick={() => onCategoryChange(cat)}
                disabled={editMode}
              >
                {cat}
              </button>
            ))}
          </div>
          <div className="header-actions">
            <button
              className="gallery-theme-toggle"
              onClick={toggleTheme}
              title="테마 전환"
            >{theme === 'dark' ? 'DARK' : 'LIGHT'}</button>
            {showEditBtn && !editMode && (
              <button
                className="header-edit-btn"
                title="빠른 편집"
                onClick={onEnterEdit}
              >✎</button>
            )}
            <button
              className="header-settings-btn"
              title="관리자"
              onClick={() => { const url = new URL(window.location); url.searchParams.set('admin', '1'); window.location = url.toString(); }}
            >⚙</button>
          </div>
        </div>
      );
    }

    function MasonryGrid({ groups, cloudName, onItemClick, editMode, onReorder }) {
      const [dragIdx, setDragIdx] = React.useState(null);
      const [dropIdx, setDropIdx] = React.useState(null);

      if (!groups || groups.length === 0) {
        return (
          <div className="empty-state">
            <p className="pixel-font" style={{fontSize: '0.7rem'}}>No images yet</p>
          </div>
        );
      }

      function handleDragStart(e, idx) {
        if (!editMode) return;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('application/masonry-group', String(idx));
        setDragIdx(idx);
      }

      function handleDragOver(e, idx) {
        if (!editMode || dragIdx === null || dragIdx === idx) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        // Reshuffle only when the dragged cursor center crosses the target midpoint
        const rect = e.currentTarget.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        const midX = rect.left + rect.width / 2;
        // Use vertical midpoint for column-flow masonry; fall back to horizontal for same-row
        const crossed = Math.abs(e.clientY - midY) < rect.height / 2
          && Math.abs(e.clientX - midX) < rect.width / 2;
        if (crossed) setDropIdx(idx);
      }

      function handleDragLeave(e, idx) {
        if (!editMode) return;
        // Ignore leaves that are entering a child of this same card (prevents flicker)
        if (e.currentTarget.contains(e.relatedTarget)) return;
        if (dropIdx === idx) setDropIdx(null);
      }

      function handleDrop(e, idx) {
        if (!editMode || dragIdx === null) return;
        e.preventDefault();
        if (dragIdx !== idx) {
          onReorder(dragIdx, idx);
        }
        setDragIdx(null);
        setDropIdx(null);
      }

      function handleDragEnd() {
        // Always reset — guards against browser bugs where `drop` is skipped
        setDragIdx(null);
        setDropIdx(null);
      }

      function handleCardClick(gi) {
        if (editMode) return; // Suppress lightbox while editing
        onItemClick(gi, 0);
      }

      return (
        <div className="masonry">
          {groups.map((group, gi) => {
            if (!group.thumbnail || !group.thumbnail.imageId) return null;
            const src = thumbUrl(cloudName, group.thumbnail.imageId, group.thumbnail.crop);
            const count = group.images.length;
            const classes = ['masonry-item'];
            if (editMode) classes.push('editable');
            if (dragIdx === gi) classes.push('dragging');
            if (dropIdx === gi) classes.push('drop-target');
            return (
              <div
                key={group.id || gi}
                className={classes.join(' ')}
                draggable={editMode}
                onDragStart={(e) => handleDragStart(e, gi)}
                onDragOver={(e) => handleDragOver(e, gi)}
                onDragLeave={(e) => handleDragLeave(e, gi)}
                onDrop={(e) => handleDrop(e, gi)}
                onDragEnd={handleDragEnd}
                onClick={() => handleCardClick(gi)}
              >
                <img src={src} alt={group.title || ''} loading="lazy" draggable={false} onContextMenu={e => e.preventDefault()} />
                {editMode && <div className="drag-handle">⋮⋮</div>}
                <div className="masonry-overlay">
                  <div className="masonry-overlay-title">{group.title || 'Untitled'}</div>
                  <div className="masonry-overlay-project">{group.project || ''}</div>
                </div>
                {count > 1 && (
                  <div className="masonry-badge">+{count - 1}</div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    function Lightbox({ groups, cloudName, groupIndex, imageIndex, onClose, onNavigate }) {
      const group = groups[groupIndex];
      if (!group) return null;

      const images = group.images;
      const len = images.length;
      const idx = imageIndex;
      const current = images[idx];
      // Circular: wrap around
      const prevIdx = (idx - 1 + len) % len;
      const nextIdx = (idx + 1) % len;
      const prev = len > 1 ? images[prevIdx] : null;
      const next = len > 1 ? images[nextIdx] : null;

      function goNext() { if (len > 1) onNavigate(groupIndex, nextIdx); }
      function goPrev() { if (len > 1) onNavigate(groupIndex, prevIdx); }

      React.useEffect(() => {
        function handleKey(e) {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowLeft') goPrev();
          if (e.key === 'ArrowRight') goNext();
        }
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [idx, groupIndex, len]);

      function handleWheel(e) {
        if (e.deltaY > 0 || e.deltaX > 0) {
          goNext();
        } else {
          goPrev();
        }
      }

      function handleBackdropClick(e) {
        if (e.target === e.currentTarget) onClose();
      }

      return (
        <div className="lightbox-backdrop" onClick={handleBackdropClick} onWheel={handleWheel}>
          <button className="lightbox-close" onClick={onClose}>&times;</button>

          <div className="lightbox-carousel">
            <div className="lightbox-peek" onClick={goPrev}>
              {prev && <img src={fullUrl(cloudName, prev.imageId)} alt="" draggable={false} onContextMenu={e => e.preventDefault()} />}
            </div>
            <div className="lightbox-slide" onClick={goNext}>
              <img src={fullUrl(cloudName, current.imageId)} alt={group.title || ''} draggable={false} onContextMenu={e => e.preventDefault()} />
            </div>
            <div className="lightbox-peek" onClick={goNext}>
              {next && <img src={fullUrl(cloudName, next.imageId)} alt="" draggable={false} onContextMenu={e => e.preventDefault()} />}
            </div>
          </div>

          <div className="lightbox-info">
            <div className="lightbox-info-title">{group.title || 'Untitled'}</div>
            <div className="lightbox-info-meta">
              {[group.project, group.category].filter(Boolean).join(' \u00b7 ')}
            </div>
            {group.description && (
              <div className="lightbox-info-desc">{group.description}</div>
            )}
          </div>

          {images.length > 1 && (
            <div className="lightbox-dots">
              {images.map((_, i) => (
                <button
                  key={i}
                  className={"lightbox-dot" + (i === idx ? " active" : "")}
                  onClick={() => onNavigate(groupIndex, i)}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    function PasswordModal({ onSubmit, onCancel, error }) {
      const inputRef = React.useRef(null);
      const [pw, setPw] = React.useState('');

      React.useEffect(() => {
        if (inputRef.current) inputRef.current.focus();
      }, []);

      function handleKeyDown(e) {
        if (e.key === 'Enter') onSubmit(pw);
        if (e.key === 'Escape') onCancel();
      }

      return (
        <div className="password-modal">
          <div className="password-box">
            <div className="pixel-font" style={{fontSize: '0.7rem', color: '#f1c40f', marginBottom: '8px'}}>
              Admin Login
            </div>
            {error && <div style={{color: '#e74c3c', fontSize: '0.8rem', marginBottom: '8px'}}>{error}</div>}
            <input
              ref={inputRef}
              type="password"
              placeholder="Password"
              value={pw}
              onChange={e => setPw(e.target.value)}
              onKeyDown={handleKeyDown}
            />
            <div className="password-box-buttons">
              <button className="btn-enter" onClick={() => onSubmit(pw)}>Enter</button>
              <button className="btn-cancel" onClick={onCancel}>Cancel</button>
            </div>
          </div>
        </div>
      );
    }

    function EditModeBar({ dirty, saving, onSave, onCancel }) {
      const statusText = saving
        ? "저장 중..."
        : dirty
          ? "편집 모드 — 변경됨"
          : "편집 모드";
      return (
        <div className="edit-mode-bar">
          <div className="edit-mode-bar-status">{statusText}</div>
          <div className="edit-mode-bar-buttons">
            <button onClick={onCancel} disabled={saving}>취소</button>
            <button className="primary" onClick={onSave} disabled={saving || !dirty}>저장</button>
          </div>
        </div>
      );
    }

    // === Toast System ===
    const ToastContext = React.createContext(null);

    function useToast() {
      return React.useContext(ToastContext);
    }

    function ToastProvider({ children }) {
      const [toasts, setToasts] = React.useState([]);
      const nextId = React.useRef(0);

      function addToast(type, title, message, duration) {
        const id = nextId.current++;
        setToasts(prev => {
          const updated = [...prev, { id, type, title, message }];
          return updated.length > 3 ? updated.slice(-3) : updated;
        });
        if (duration !== 0) {
          setTimeout(() => {
            setToasts(prev => prev.filter(t => t.id !== id));
          }, duration || 3000);
        }
      }

      function removeToast(id) {
        setToasts(prev => prev.filter(t => t.id !== id));
      }

      const toast = React.useMemo(() => ({
        success: (title, message) => addToast('success', title, message, 3000),
        error: (title, message) => addToast('error', title, message, 0),
        warning: (title, message) => addToast('warning', title, message, 5000),
      }), []);

      return React.createElement(ToastContext.Provider, { value: toast },
        children,
        React.createElement(ToastContainer, { toasts, removeToast })
      );
    }

    function ToastContainer({ toasts, removeToast }) {
      if (toasts.length === 0) return null;
      const icons = { success: '✓', error: '✗', warning: '⚠' };
      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={"toast toast-" + t.type}>
              <span className="toast-icon">{icons[t.type]}</span>
              <div className="toast-body">
                <div className="toast-title">{t.title}</div>
                {t.message && <div className="toast-message">{t.message}</div>}
              </div>
              <button className="toast-close" onClick={() => removeToast(t.id)}>✕</button>
            </div>
          ))}
        </div>
      );
    }

    // === Confirm Dialog (replaces confirm()) ===
    function ConfirmDialog({ title, message, confirmLabel, confirmColor, onConfirm, onCancel }) {
      React.useEffect(() => {
        function handleKey(e) {
          if (e.key === 'Escape') onCancel();
          if (e.key === 'Enter' && (e.target === document.body || e.target.closest('.password-modal'))) onConfirm();
        }
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [onConfirm, onCancel]);

      return (
        <div className="password-modal">
          <div className="password-box" style={{minWidth: '340px'}}>
            <div style={{fontSize: '1rem', color: '#f1c40f', marginBottom: '12px'}}>⚠ {title}</div>
            <p style={{color: '#ccc', fontSize: '0.9rem', marginBottom: '20px', lineHeight: '1.5'}}>{message}</p>
            <div className="password-box-buttons">
              <button className="btn-cancel" onClick={onCancel}>취소</button>
              <button className="btn-enter" onClick={onConfirm}
                style={{background: confirmColor || '#e74c3c', borderColor: confirmColor || '#e74c3c'}}>
                {confirmLabel || '삭제'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // === Admin Components (Single-Flow Layout) ===

    // --- Component 1: AdminUploadZone ---
    function AdminUploadZone({ cloudName, uploadImage, toast, folders, onAddFolder }) {
      const [files, setFiles] = React.useState([]);
      const [folder, setFolder] = React.useState('');
      const [dragOver, setDragOver] = React.useState(false);
      const [newFolderMode, setNewFolderMode] = React.useState(false);
      const [newFolderName, setNewFolderName] = React.useState('');

      // 폴더 목록이 로드되면 첫 항목을 기본 선택
      React.useEffect(() => {
        if (folders && folders.length > 0 && !folder) {
          setFolder(folders[0]);
        }
      }, [folders]);
      const activeUploads = React.useRef(0);
      const queueRef = React.useRef([]);
      const nextFileId = React.useRef(0);
      const xhrSetRef = React.useRef(new Set());

      // Abort in-flight XHRs on unmount
      React.useEffect(() => {
        return () => { xhrSetRef.current.forEach(x => x.abort()); };
      }, []);

      function addFiles(fileList) {
        const newFiles = Array.from(fileList).map(f => ({
          id: 'upload_' + (nextFileId.current++),
          file: f,
          name: f.name,
          size: f.size,
          status: 'queued',
          progress: 0,
          preview: null,
          error: null,
        }));
        // Generate previews
        newFiles.forEach((entry, i) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, preview: e.target.result } : f));
          };
          reader.readAsDataURL(entry.file);
        });
        setFiles(prev => [...prev, ...newFiles]);
        newFiles.forEach(f => queueRef.current.push(f));
        processQueue();
      }

      function processQueue() {
        while (activeUploads.current < 2 && queueRef.current.length > 0) {
          const entry = queueRef.current.shift();
          activeUploads.current++;
          uploadFile(entry);
        }
      }

      function uploadFile(entry) {
        setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'uploading' } : f));
        const fd = new FormData();
        fd.append('file', entry.file);
        fd.append('folder', folder);

        const xhr = new XMLHttpRequest();
        xhrSetRef.current.add(xhr);
        xhr.open('POST', API_BASE + '/api/upload');
        const token = sessionStorage.getItem('admin_token');
        if (token) xhr.setRequestHeader('Authorization', 'Bearer ' + token);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, progress: pct } : f));
          }
        };

        xhr.onload = () => {
          xhrSetRef.current.delete(xhr);
          activeUploads.current--;
          try {
            const result = JSON.parse(xhr.responseText);
            if (xhr.status >= 200 && xhr.status < 300 && !result.error) {
              setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'done', progress: 100 } : f));
              uploadImage(result);
              toast.success('업로드 완료', entry.name);
            } else {
              setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'failed', error: result.error || 'Upload failed' } : f));
              toast.error('업로드 실패', entry.name + ': ' + (result.error || 'Unknown error'));
            }
          } catch (e) {
            setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'failed', error: 'Parse error' } : f));
            toast.error('업로드 실패', entry.name);
          }
          processQueue();
        };

        xhr.onerror = () => {
          xhrSetRef.current.delete(xhr);
          activeUploads.current--;
          setFiles(prev => prev.map(f => f.id === entry.id ? { ...f, status: 'failed', error: 'Network error' } : f));
          toast.error('업로드 실패', entry.name + ': Network error');
          processQueue();
        };

        xhr.send(fd);
      }

      function retryFile(entry) {
        const updated = { ...entry, status: 'queued', progress: 0, error: null };
        setFiles(prev => prev.map(f => f.id === entry.id ? updated : f));
        queueRef.current.push(updated);
        processQueue();
      }

      const doneCount = files.filter(f => f.status === 'done').length;
      const totalCount = files.length;

      return (
        <div className="admin-card" style={{flexShrink: 0, borderBottom: '1px solid #636e72'}}>
          <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px'}}>
            <span className="pixel-font" style={{fontSize: '1rem', color: '#f1c40f'}}>업로드</span>
            <div style={{display: 'flex', gap: '6px', alignItems: 'center'}}>
              <span style={{fontSize: '0.85rem', color: '#888'}}>폴더:</span>
              {newFolderMode ? (
                <div style={{display: 'flex', gap: '4px', alignItems: 'center'}}>
                  <input
                    autoFocus
                    type="text" value={newFolderName}
                    onChange={e => setNewFolderName(e.target.value)}
                    onKeyDown={e => {
                      if (e.key === 'Enter' && newFolderName.trim()) {
                        const name = newFolderName.trim();
                        onAddFolder(name);
                        setFolder(name);
                        setNewFolderName('');
                        setNewFolderMode(false);
                      }
                      if (e.key === 'Escape') { setNewFolderMode(false); setNewFolderName(''); }
                    }}
                    placeholder="폴더명 입력 후 Enter"
                    style={{background: '#111', border: '1px solid #f1c40f', color: '#e0e0e0', padding: '3px 6px', fontSize: '0.85rem', borderRadius: '3px', width: '160px'}}
                  />
                  <button onClick={() => { setNewFolderMode(false); setNewFolderName(''); }}
                    style={{background: 'none', border: 'none', color: '#888', cursor: 'pointer', fontSize: '1rem', lineHeight: 1}}>✕</button>
                </div>
              ) : (
                <select
                  value={folder}
                  onChange={e => {
                    if (e.target.value === '__new__') { setNewFolderMode(true); }
                    else setFolder(e.target.value);
                  }}
                  style={{background: '#111', border: '1px solid #636e72', color: '#e0e0e0', padding: '3px 6px', fontSize: '0.85rem', borderRadius: '3px', minWidth: '140px'}}
                >
                  {(folders || []).map(f => <option key={f} value={f}>{f}</option>)}
                  <option value="__new__">+ 새 폴더</option>
                </select>
              )}
            </div>
          </div>
          <div
            className={"upload-zone" + (dragOver ? " drag-over" : "")}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); addFiles(e.dataTransfer.files); }}
            onClick={() => { const input = document.createElement('input'); input.type = 'file'; input.multiple = true; input.accept = 'image/*'; input.onchange = () => addFiles(input.files); input.click(); }}
            style={{border: '2px dashed ' + (dragOver ? '#f1c40f' : '#636e72'), borderRadius: '6px', padding: '20px', textAlign: 'center', cursor: 'pointer', background: dragOver ? 'rgba(241,196,15,0.05)' : 'transparent', transition: 'all 0.2s'}}
          >
            <div style={{fontSize: '1.5rem', marginBottom: '4px'}}>{dragOver ? '📂' : '📁'}</div>
            <div style={{fontSize: '0.75rem', color: '#888'}}>클릭 또는 드래그하여 업로드</div>
          </div>

          {files.length > 0 && (
            <div style={{marginTop: '8px'}}>
              <div style={{fontSize: '0.7rem', color: '#888', marginBottom: '4px'}}>{doneCount}/{totalCount} 완료</div>
              <div style={{height: '3px', background: '#333', borderRadius: '2px', overflow: 'hidden', marginBottom: '8px'}}>
                <div style={{height: '100%', width: (totalCount > 0 ? (doneCount / totalCount * 100) : 0) + '%', background: '#f1c40f', transition: 'width 0.3s'}} />
              </div>
              <div style={{maxHeight: '150px', overflowY: 'auto'}}>
                {files.map((f, i) => (
                  <div key={i} style={{display: 'flex', alignItems: 'center', gap: '8px', padding: '4px 0', borderBottom: '1px solid #222'}}>
                    {f.preview && <img src={f.preview} style={{width: '32px', height: '32px', objectFit: 'cover', borderRadius: '3px'}} />}
                    <div style={{flex: 1, minWidth: 0}}>
                      <div style={{fontSize: '0.7rem', color: '#ccc', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>{f.name}</div>
                      {f.status === 'uploading' && (
                        <div style={{height: '2px', background: '#333', borderRadius: '1px', marginTop: '2px'}}>
                          <div style={{height: '100%', width: f.progress + '%', background: '#3498db', transition: 'width 0.2s'}} />
                        </div>
                      )}
                      {f.status === 'failed' && <div style={{fontSize: '0.6rem', color: '#e74c3c'}}>{f.error}</div>}
                    </div>
                    <div style={{fontSize: '0.65rem', flexShrink: 0}}>
                      {f.status === 'queued' && <span style={{color: '#888'}}>대기</span>}
                      {f.status === 'uploading' && <span style={{color: '#3498db'}}>{f.progress}%</span>}
                      {f.status === 'done' && <span style={{color: '#2ecc71'}}>✓</span>}
                      {f.status === 'failed' && <button onClick={(e) => { e.stopPropagation(); retryFile(f); }} style={{background: 'none', border: '1px solid #e74c3c', color: '#e74c3c', padding: '1px 6px', borderRadius: '3px', fontSize: '0.6rem', cursor: 'pointer'}}>재시도</button>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

          {confirmTarget && (
            <ConfirmDialog

    // --- Component 4: AdminCropEditor ---
    function AdminCropEditor({ group, cloudName, updateGroup, saveCrop, toast, onClose }) {
      const thumbId = group.thumbnail && group.thumbnail.imageId;
      const existingCrop = group.thumbnail && group.thumbnail.crop;

      const imgRef = React.useRef(null);
      const containerRef = React.useRef(null);
      const [imgLoaded, setImgLoaded] = React.useState(false);
      const [crop, setCrop] = React.useState(existingCrop || null);
      const [dragging, setDragging] = React.useState(false);
      const [dragStart, setDragStart] = React.useState(null);
      const [ratio, setRatio] = React.useState('free');
      const [handle, setHandle] = React.useState(null);

      if (!thumbId) return <div style={{color: '#888', padding: '12px', fontSize: '0.8rem'}}>썸네일 이미지를 먼저 설정하세요.</div>;

      const imgSrc = "https://res.cloudinary.com/" + cloudName + "/image/upload/q_auto,f_auto/" + thumbId;

      function getScale() {
        if (!imgRef.current) return 1;
        return imgRef.current.naturalWidth / imgRef.current.clientWidth;
      }

      function toDisplay(c) {
        if (!c) return null;
        const s = getScale();
        return { x: c.x / s, y: c.y / s, width: c.width / s, height: c.height / s };
      }

      function toNative(c) {
        if (!c) return null;
        const s = getScale();
        return { x: Math.round(c.x * s), y: Math.round(c.y * s), width: Math.round(c.width * s), height: Math.round(c.height * s) };
      }

      function constrainRatio(w, h) {
        if (ratio === '4:3') return [w, w * 3 / 4];
        if (ratio === '1:1') return [w, w];
        if (ratio === '16:9') return [w, w * 9 / 16];
        return [w, h];
      }

      // 호버 위치에 따라 cursor 업데이트 (re-render 없이 DOM 직접 조작)
      function updateCursor(x, y) {
        if (!containerRef.current) return;
        const dc = toDisplay(crop);
        if (!dc) { containerRef.current.style.cursor = 'crosshair'; return; }
        const HANDLE_HIT = 12;
        const corners = [
          { cx: dc.x, cy: dc.y }, { cx: dc.x + dc.width, cy: dc.y },
          { cx: dc.x, cy: dc.y + dc.height }, { cx: dc.x + dc.width, cy: dc.y + dc.height },
        ];
        for (const c of corners) {
          if (Math.abs(x - c.cx) < HANDLE_HIT && Math.abs(y - c.cy) < HANDLE_HIT) {
            containerRef.current.style.cursor = 'nwse-resize'; return;
          }
        }
        if (x >= dc.x && x <= dc.x + dc.width && y >= dc.y && y <= dc.y + dc.height) {
          containerRef.current.style.cursor = 'grab'; return;
        }
        containerRef.current.style.cursor = 'crosshair';
      }

      function handleMouseDown(e) {
        if (!imgRef.current) return;
        const rect = imgRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const dc = toDisplay(crop);
        if (dc) {
          const HANDLE_HIT = 12;
          // 1. 코너 핸들 → 리사이즈
          const corners = [
            { name: 'tl', cx: dc.x, cy: dc.y },
            { name: 'tr', cx: dc.x + dc.width, cy: dc.y },
            { name: 'bl', cx: dc.x, cy: dc.y + dc.height },
            { name: 'br', cx: dc.x + dc.width, cy: dc.y + dc.height },
          ];
          for (const c of corners) {
            if (Math.abs(x - c.cx) < HANDLE_HIT && Math.abs(y - c.cy) < HANDLE_HIT) {
              setHandle(c.name);
              setDragging(true);
              setDragStart({ x, y, crop: { ...dc } });
              return;
            }
          }
          // 2. 크롭 영역 내부 → 이동
          if (x >= dc.x && x <= dc.x + dc.width && y >= dc.y && y <= dc.y + dc.height) {
            setHandle('move');
            setDragging(true);
            setDragStart({ x, y, crop: { ...dc } });
            if (containerRef.current) containerRef.current.style.cursor = 'grabbing';
            return;
          }
        }
        // 3. 빈 영역 → 새 크롭
        setDragging(true);
        setHandle(null);
        setDragStart({ x, y, crop: null });
        setCrop(toNative({ x, y, width: 1, height: 1 }));
      }

      function handleMouseMove(e) {
        if (!imgRef.current) return;
        const rect = imgRef.current.getBoundingClientRect();
        const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
        const y = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

        if (!dragging || !dragStart) {
          // 드래그 중 아닐 때: cursor 힌트만 업데이트
          updateCursor(x, y);
          return;
        }

        if (handle === 'move' && dragStart.crop) {
          // 크롭 영역 이동
          const dc = dragStart.crop;
          const dx = x - dragStart.x;
          const dy = y - dragStart.y;
          const imgW = rect.width;
          const imgH = rect.height;
          const newX = Math.max(0, Math.min(dc.x + dx, imgW - dc.width));
          const newY = Math.max(0, Math.min(dc.y + dy, imgH - dc.height));
          setCrop(toNative({ x: newX, y: newY, width: dc.width, height: dc.height }));
        } else if (handle && dragStart.crop) {
          // 핸들 리사이즈
          const dc = { ...dragStart.crop };
          const dx = x - dragStart.x;
          const dy = y - dragStart.y;
          let newCrop;
          if (handle === 'br') {
            let [w, h] = constrainRatio(dc.width + dx, dc.height + dy);
            newCrop = { x: dc.x, y: dc.y, width: Math.max(20, w), height: Math.max(20, h) };
          } else if (handle === 'tl') {
            let [w, h] = constrainRatio(dc.width - dx, dc.height - dy);
            newCrop = { x: dc.x + dc.width - Math.max(20, w), y: dc.y + dc.height - Math.max(20, h), width: Math.max(20, w), height: Math.max(20, h) };
          } else if (handle === 'tr') {
            let [w, h] = constrainRatio(dc.width + dx, dc.height - dy);
            newCrop = { x: dc.x, y: dc.y + dc.height - Math.max(20, h), width: Math.max(20, w), height: Math.max(20, h) };
          } else if (handle === 'bl') {
            let [w, h] = constrainRatio(dc.width - dx, dc.height + dy);
            newCrop = { x: dc.x + dc.width - Math.max(20, w), y: dc.y, width: Math.max(20, w), height: Math.max(20, h) };
          }
          setCrop(toNative(newCrop));
        } else {
          // 새 크롭 드래그
          const sx = dragStart.x, sy = dragStart.y;
          let w = x - sx, h = y - sy;
          let cx = sx, cy = sy;
          if (w < 0) { cx = x; w = -w; }
          if (h < 0) { cy = y; h = -h; }
          [w, h] = constrainRatio(w, h);
          setCrop(toNative({ x: cx, y: cy, width: Math.max(10, w), height: Math.max(10, h) }));
        }
      }

      function handleMouseUp(e) {
        setDragging(false);
        setHandle(null);
        setDragStart(null);
        // cursor 복원
        if (imgRef.current && containerRef.current) {
          const rect = imgRef.current.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          updateCursor(x, y);
        }
      }

      async function applyCrop() {
        if (!crop) return;
        await saveCrop(group.id, thumbId, crop);
        onClose();
      }

      function resetCrop() {
        setCrop(null);
        updateGroup(group.id, { thumbnail: { imageId: thumbId, crop: null } });
        toast.success('크롭 초기화', '크롭이 제거되었습니다');
      }

              <span style={{fontSize: '0.85rem', color: '#f1c40f', marginRight: '4px'}}>✂</span>
              {['4:3', '1:1', '16:9', 'free'].map(r => (
                <button key={r} onClick={() => setRatio(r)}
                  style={{fontSize: '0.8rem', padding: '4px 10px', background: ratio === r ? '#f1c40f' : '#333', color: ratio === r ? '#000' : '#ccc', border: '1px solid ' + (ratio === r ? '#f1c40f' : '#636e72'), borderRadius: '3px', cursor: 'pointer'}}>
                  {r === 'free' ? 'Free' : r}
                </button>
              ))}
            </div>
            <div style={{display: 'flex', gap: '6px', alignItems: 'center'}}>
              <button onClick={resetCrop}
                style={{fontSize: '0.9rem', padding: '5px 14px', background: '#333', color: '#ccc', border: '1px solid #636e72', borderRadius: '3px', cursor: 'pointer'}}>
                초기화
              </button>
              <button onClick={applyCrop} disabled={!crop}
                style={{fontSize: '0.9rem', padding: '5px 16px', background: crop ? '#2ecc71' : '#333', color: crop ? '#000' : '#555', border: '1px solid ' + (crop ? '#2ecc71' : '#636e72'), borderRadius: '3px', cursor: crop ? 'pointer' : 'default', fontWeight: 'bold'}}>
                적용
              </button>
              <button onClick={onClose}
                style={{background: 'none', border: 'none', color: '#888', fontSize: '1.1rem', cursor: 'pointer', lineHeight: 1, padding: '2px 4px'}}>✕</button>
            </div>
          </div>

          {/* 크롭 캔버스 */}
          <div ref={containerRef}
            style={{position: 'relative', display: 'inline-block', maxWidth: '100%', userSelect: 'none', cursor: 'crosshair'}}
            onMouseDown={handleMouseDown}
            onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp}

          >
            <img ref={imgRef} src={imgSrc} onLoad={() => setImgLoaded(true)}

            {imgLoaded && displayCrop && (

        e.preventDefault();
        const groupImage = e.dataTransfer.types.includes('application/group-image');

        if (groupImage || poolImage) {
          setInsertIdx(idx);
        }

        const groupImageIdx = e.dataTransfer.getData('application/group-image');

        }
        setDragIdx(null);
        setInsertIdx(null);
      }

      function handleEndZoneDrop(e) {
        e.preventDefault();
        e.stopPropagation();
        const poolImageId = e.dataTransfer.getData('application/pool-image');
        if (poolImageId) {
          addImageToGroup(group.id, poolImageId);
          toast.success('이미지 추가', '게시물에 이미지를 추가했습니다');

                <input type="text" value={group.project || ''} onChange={e => updateGroup(group.id, { project: e.target.value })}
                  style={{width: '100%', background: '#111', border: '1px solid #636e72', color: '#e0e0e0', padding: '6px', fontSize: '0.9rem', borderRadius: '3px', boxSizing: 'border-box'}} />
              </div>
              <div>
                <label style={{fontSize: '0.85rem', color: '#888', display: 'block', marginBottom: '2px'}}>카테고리</label>
                <select value={group.category || ''} onChange={e => updateGroup(group.id, { category: e.target.value })}

                  <option value={1}>1</option>

            </div>
            <div style={{marginTop: '8px'}}>
              <label style={{fontSize: '0.85rem', color: '#888', display: 'block', marginBottom: '2px'}}>설명</label>
              <textarea value={group.description || ''} onChange={e => updateGroup(group.id, { description: e.target.value })}
                rows={2} style={{width: '100%', background: '#111', border: '1px solid #636e72', color: '#e0e0e0', padding: '6px', fontSize: '0.9rem', borderRadius: '3px', resize: 'vertical', boxSizing: 'border-box'}} />

                        )}

                            style={{background: 'none', border: 'none', cursor: 'pointer', fontSize: '0.7rem', padding: '2px 4px', color: '#f1c40f'}}>✂</button>

                        <button onClick={() => removeImageFromGroup(group.id, img.imageId)} title="제거"
