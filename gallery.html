    // --- Component 6: AdminApp (New Single-Flow) ---
    function AdminApp({ config, setConfig, allImages, setAllImages, onExit, cloudName }) {
      const [selectedGroup, setSelectedGroup] = React.useState(null);
      const [saving, setSaving] = React.useState(false);
      const [dirty, setDirty] = React.useState(false);
      const [searchQuery, setSearchQuery] = React.useState('');
      const [poolDragOver, setPoolDragOver] = React.useState(false);
      const [folders, setFolders] = React.useState([]);

      // 폴더 목록 로드 (KV 캐시 경유)
      React.useEffect(() => {
        api('/api/folders').then(data => {
          if (data.folders) setFolders(data.folders);
        }).catch(() => {});
      }, []);

      function handleAddFolder(name) {
        setFolders(prev => prev.includes(name) ? prev : [...prev, name]);
      }
      const toast = useToast();
      const initialConfigRef = React.useRef(JSON.stringify(config));

      // Track dirty state
      React.useEffect(() => {
        const current = JSON.stringify(config);
        setDirty(current !== initialConfigRef.current);
      }, [config]);

      // Beforeunload warning
      React.useEffect(() => {
        function handleBeforeUnload(e) {
          if (dirty) { e.preventDefault(); e.returnValue = ''; }
        }
        window.addEventListener('beforeunload', handleBeforeUnload);
        return () => window.removeEventListener('beforeunload', handleBeforeUnload);
      }, [dirty]);

      // Computed sets
      const assignedIds = React.useMemo(() => {
        const s = new Set();
        (config.groups || []).forEach(g => (g.images || []).forEach(img => s.add(img.imageId)));
        return s;
      }, [config]);

      const hiddenSet = React.useMemo(() => new Set(config.hiddenImages || []), [config]);

      // --- Admin functions ---
      async function saveConfig() {
        setSaving(true);
        try {
          await api('/api/config', { method: 'PUT', json: config });
          initialConfigRef.current = JSON.stringify(config);
          setDirty(false);
          toast.success('저장 완료', '설정이 저장되었습니다');
        } catch (e) {
          toast.error('저장 실패', e.message || '서버 오류');
        }
        setSaving(false);
      }

      function addGroup() {
        const id = 'grp_' + Date.now();
        const newGroup = {
          id, title: '새 게시물', project: '', category: (config.categories && config.categories[0]) || 'ETC',
          description: '', gridPosition: config.groups.length,
          gridSize: { colSpan: 1, rowSpan: 1 },
          thumbnail: { imageId: '', crop: null },
          images: [],
        };
        setConfig({ ...config, groups: [...config.groups, newGroup] });
        setSelectedGroup(id);
      }

      function deleteGroup(groupId) {
        setConfig({ ...config, groups: config.groups.filter(g => g.id !== groupId) });
        if (selectedGroup === groupId) setSelectedGroup(null);
      }

      function updateGroup(groupId, updates) {
        setConfig({
          ...config,
          groups: config.groups.map(g => g.id === groupId ? { ...g, ...updates } : g),
        });
      }

      async function saveCrop(groupId, imageId, crop) {
        const newConfig = {
          ...config,
          groups: config.groups.map(g =>
            g.id === groupId ? { ...g, thumbnail: { imageId, crop } } : g
          ),
        };
        setConfig(newConfig);
        setSaving(true);
        try {
          await api('/api/config', { method: 'PUT', json: newConfig });
          initialConfigRef.current = JSON.stringify(newConfig);
          setDirty(false);
          toast.success('크롭 저장 완료', '썸네일 크롭이 서버에 저장되었습니다');
        } catch (e) {
          toast.error('크롭 저장 실패', e.message || '서버 오류');
        }
        setSaving(false);
      }

      function addImageToGroup(groupId, publicId) {
        setConfig({
          ...config,
          groups: config.groups.map(g => {
            if (g.id !== groupId) return g;
            if (g.images.some(img => img.imageId === publicId)) return g;
            const newImages = [...g.images, { imageId: publicId, visible: true }];
            const thumb = g.thumbnail.imageId ? g.thumbnail : { imageId: publicId, crop: null };
            return { ...g, images: newImages, thumbnail: thumb };
          }),
        });
      }

      function removeImageFromGroup(groupId, publicId) {
        setConfig({
          ...config,
          groups: config.groups.map(g => {
            if (g.id !== groupId) return g;
            const newImages = g.images.filter(img => img.imageId !== publicId);
            const thumb = g.thumbnail.imageId === publicId
              ? { imageId: (newImages[0] && newImages[0].imageId) || '', crop: null } : g.thumbnail;
            return { ...g, images: newImages, thumbnail: thumb };
          }),
        });
      }

      function toggleHidden(publicId) {
        const hidden = new Set(config.hiddenImages || []);
        if (hidden.has(publicId)) hidden.delete(publicId); else hidden.add(publicId);
        setConfig({ ...config, hiddenImages: Array.from(hidden) });
      }

      function setThumbnailImage(groupId, publicId) {
        updateGroup(groupId, { thumbnail: { imageId: publicId, crop: null } });
      }

      function moveGroup(fromIdx, toIdx) {
        const groups = [...config.groups];
        const moved = groups.splice(fromIdx, 1)[0];
        groups.splice(toIdx, 0, moved);
        groups.forEach((g, i) => g.gridPosition = i);
        setConfig({ ...config, groups });
      }

      function moveImageInGroup(groupId, fromIdx, toIdx) {
        setConfig({
          ...config,
          groups: config.groups.map(g => {
            if (g.id !== groupId) return g;
            const imgs = [...g.images];
            const moved = imgs.splice(fromIdx, 1)[0];
            imgs.splice(toIdx, 0, moved);
            return { ...g, images: imgs };
          }),
        });
      }

      function handleUploadComplete(result) {
        setAllImages(prev => [result, ...prev]);
      }

      async function deleteImage(publicId) {
        try {
          await api('/api/images/' + encodeURIComponent(publicId), { method: 'DELETE' });
          setAllImages(prev => prev.filter(img => img.publicId !== publicId));
          setConfig({
            ...config,
            groups: config.groups.map(g => ({
              ...g,
              images: g.images.filter(img => img.imageId !== publicId),
              thumbnail: g.thumbnail.imageId === publicId
                ? { imageId: (g.images.find(img => img.imageId !== publicId) || {}).imageId || '', crop: null }
                : g.thumbnail,
            })),
            hiddenImages: (config.hiddenImages || []).filter(id => id !== publicId),
          });
          toast.success('삭제 완료', publicId + ' 삭제됨');
        } catch (e) {
          toast.error('삭제 실패', e.message || '서버 오류');
        }
      }

      const selectedGroupObj = selectedGroup ? (config.groups || []).find(g => g.id === selectedGroup) : null;

      // Save status
      let saveStatusDot, saveStatusText;
      if (saving) {
        saveStatusDot = '#3498db';
        saveStatusText = '저장 중...';
      } else if (dirty) {
        saveStatusDot = '#f1c40f';
        saveStatusText = '변경사항 있음';
      } else {
        saveStatusDot = '#2ecc71';
        saveStatusText = '저장됨';
      }

      return (
        <div>
          <div className="admin-header">
            <button className="admin-btn" onClick={onExit} style={{background: 'transparent', color: '#f1c40f', border: '1px solid #636e72'}}>
              ◀ Exit
            </button>
            <span className="pixel-font" style={{color: '#f1c40f', fontSize: '1.1rem'}}>Admin Mode</span>
            <div style={{display: 'flex', alignItems: 'center', gap: '8px'}}>
              <span style={{display: 'inline-block', width: '8px', height: '8px', borderRadius: '50%', background: saveStatusDot}} />
              <span style={{fontSize: '0.95rem', color: '#888'}}>{saveStatusText}</span>
              <button className="admin-btn success" onClick={saveConfig} disabled={saving}>
                {saving ? '저장 중...' : '저장'}
              </button>
            </div>
          </div>

          <div className="admin-layout">
            <div className="admin-left">
              <AdminUploadZone cloudName={cloudName} uploadImage={handleUploadComplete} toast={toast} folders={folders} onAddFolder={handleAddFolder} />
              <AdminImagePool
                allImages={allImages} assignedIds={assignedIds} hiddenSet={hiddenSet} cloudName={cloudName}
                searchQuery={searchQuery} onSearchChange={setSearchQuery}
                toggleHidden={toggleHidden} deleteImage={deleteImage} toast={toast}
              />
            </div>
            <div
              className="admin-right"
              onDragOver={e => {
                if (e.dataTransfer.types.includes('application/pool-image')) {
                  e.preventDefault();
                  setPoolDragOver(true);
                }
              }}
              onDragLeave={e => {
                if (!e.currentTarget.contains(e.relatedTarget)) setPoolDragOver(false);
              }}
              onDrop={e => {
                const poolImageId = e.dataTransfer.getData('application/pool-image');
                if (poolImageId && selectedGroup) {
                  e.preventDefault();
                  addImageToGroup(selectedGroup, poolImageId);
                  toast.success('이미지 추가', '게시물에 이미지를 추가했습니다');
                }
                setPoolDragOver(false);
              }}
              style={poolDragOver ? {outline: '2px dashed #f1c40f', outlineOffset: '-4px'} : undefined}
            >
              {selectedGroupObj ? (
                <React.Fragment>
                  <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 16px', borderBottom: '1px solid #636e72'}}>
                    <div>
                      <span style={{fontSize: '1rem', color: '#e0e0e0', fontWeight: 'bold'}}>{selectedGroupObj.title || 'Untitled'}</span>
                      <span style={{fontSize: '0.8rem', color: '#888', marginLeft: '8px', background: '#333', padding: '2px 8px', borderRadius: '10px'}}>{selectedGroupObj.category || ''}</span>
                    </div>
                  </div>
                  <div style={{padding: '16px', overflowY: 'auto', maxHeight: 'calc(100vh - 180px)'}}>
                    <AdminGroupDetail
                      config={config} group={selectedGroupObj} cloudName={cloudName}
                      updateGroup={updateGroup} saveCrop={saveCrop} removeImageFromGroup={removeImageFromGroup}
                      setThumbnailImage={setThumbnailImage} moveImageInGroup={moveImageInGroup}
                      addImageToGroup={addImageToGroup} toast={toast}
                    />
                  </div>
                </React.Fragment>
              ) : (
                <div style={{display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: '#636e72', fontSize: '1rem'}}>
                  오른쪽에서 게시물을 선택하세요
                </div>
              )}
            </div>
            <div className="admin-groups-panel">
              <AdminGroupList
                config={config} selectedGroup={selectedGroup} setSelectedGroup={setSelectedGroup}
                addGroup={addGroup} deleteGroup={deleteGroup} moveGroup={moveGroup}
                addImageToGroup={addImageToGroup} cloudName={cloudName} toast={toast}
              />
            </div>
          </div>
        </div>
      );
    }

    function EditBarWithToast({ dirty, saving, onSave, onCancel }) {
      const toast = useToast();
      return (
        <EditModeBar
          dirty={dirty}
          saving={saving}
          onSave={() => onSave(toast)}
          onCancel={() => onCancel(toast)}
        />
      );
    }

    // === Main App ===
    function App() {
      const [galleryData, setGalleryData] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [category, setCategory] = React.useState('all');

      // === Theme (포트폴리오와 localStorage 공유) ===
      const [theme, setTheme] = React.useState(
        () => localStorage.getItem('portfolio-theme') || 'light'
      );
      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('portfolio-theme', theme);
      }, [theme]);
      const [lightbox, setLightbox] = React.useState(null); // { groupIndex, imageIndex }
      const [adminMode, setAdminMode] = React.useState(false);
      const [showPasswordModal, setShowPasswordModal] = React.useState(false);
      const [adminConfig, setAdminConfig] = React.useState(null);
      const [allImages, setAllImages] = React.useState([]);
      const [authError, setAuthError] = React.useState('');

      // === Edit Mode (inline reorder) ===
      const [editMode, setEditMode] = React.useState(false);
      const [editConfig, setEditConfig] = React.useState(null);
      const [editDirty, setEditDirty] = React.useState(false);
      const [editSaving, setEditSaving] = React.useState(false);
      const [showEditPasswordModal, setShowEditPasswordModal] = React.useState(false);
      const [editAuthError, setEditAuthError] = React.useState('');
      const [confirmCancel, setConfirmCancel] = React.useState(false);
      const editInitialSnapRef = React.useRef(null);

      function loadGallery() {
        setLoading(true);
        api('/api/gallery')
          .then(data => {
            setGalleryData(data);
            setLoading(false);
          })
          .catch(err => {
            console.error('Failed to fetch gallery:', err);
            setLoading(false);
          });
      }

      React.useEffect(() => {
        // Check for admin mode
        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') === '1') {
          const token = sessionStorage.getItem('admin_token');
          if (token) {
            // Auto-login with stored token
            api('/api/config').then(cfg => {
              if (cfg.error) {
                sessionStorage.removeItem('admin_token');
                setShowPasswordModal(true);
              } else {
                api('/api/images').then(imgs => {
                  setAdminConfig(cfg);
                  setAllImages(imgs.images || []);
                  setAdminMode(true);
                });
              }
            }).catch(() => {
              sessionStorage.removeItem('admin_token');
              setShowPasswordModal(true);
            });
          } else {
            setShowPasswordModal(true);
          }
        }

        // Fetch gallery data
        loadGallery();
      }, []);

      // Warn on page unload if edit mode is dirty
      React.useEffect(() => {
        if (!editDirty) return;
        function handler(e) {
          e.preventDefault();
          e.returnValue = '';
        }
        window.addEventListener('beforeunload', handler);
        return () => window.removeEventListener('beforeunload', handler);
      }, [editDirty]);

      async function handlePasswordSubmit(pw) {
        setAuthError('');
        sessionStorage.setItem('admin_token', pw);
        try {
          const config = await api('/api/config');
          if (config.error) {
            setAuthError('인증 실패');
            sessionStorage.removeItem('admin_token');
            return;
          }
          const imgs = await api('/api/images');
          setAdminConfig(config);
          setAllImages(imgs.images || []);
          setAdminMode(true);
          setShowPasswordModal(false);
        } catch (e) {
          setAuthError('서버 연결 실패');
          sessionStorage.removeItem('admin_token');
        }
      }

      function handlePasswordCancel() {
        setShowPasswordModal(false);
        // Remove ?admin=1 from URL
        const url = new URL(window.location);
        url.searchParams.delete('admin');
        window.history.replaceState({}, '', url);
      }

      // Admin mode
      if (adminMode && adminConfig) {
        return <ToastProvider><AdminApp
          config={adminConfig}
          setConfig={setAdminConfig}
          allImages={allImages}
          setAllImages={setAllImages}
          onExit={() => { setAdminMode(false); loadGallery(); }}
          cloudName={galleryData && galleryData.cloudName ? galleryData.cloudName : 'duwi0pqm2'}
        /></ToastProvider>;
      }

      // Derive cloud name and groups from API response
      const cloudName = galleryData && galleryData.cloudName ? galleryData.cloudName : '';
      const allGroups = galleryData && galleryData.groups ? galleryData.groups : [];

      // Derive categories
      const categories = [];
      const catSet = {};
      allGroups.forEach(g => {
        if (g.category && !catSet[g.category]) {
          catSet[g.category] = true;
          categories.push(g.category);
        }
      });

      // In edit mode, use full editConfig.groups (category is forced to 'all')
      const sourceGroups = editMode && editConfig
        ? editConfig.groups
        : allGroups;
      const filteredGroups = category === 'all'
        ? sourceGroups
        : sourceGroups.filter(g => g.category === category);

      // Edit button visibility: hide when URL has ?admin=1 (admin mode owns it)
      const urlParams = new URLSearchParams(window.location.search);
      const showEditBtn = urlParams.get('admin') !== '1';

      async function loadEditConfig() {
        const cfg = await api('/api/config');
        if (cfg && cfg.error) {
          // Token invalid/missing
          sessionStorage.removeItem('admin_token');
          return null;
        }
        return cfg;
      }

      async function enterEditMode() {
        const token = sessionStorage.getItem('admin_token');
        if (token) {
          // Try with existing token
          try {
            const cfg = await loadEditConfig();
            if (cfg) {
              beginEditSession(cfg);
              return;
            }
          } catch (e) {
            console.error('[edit] config load failed:', e);
          }
        }
        // No token or token expired — prompt
        setEditAuthError('');
        setShowEditPasswordModal(true);
      }

      function beginEditSession(cfg) {
        const snap = JSON.stringify(cfg);
        editInitialSnapRef.current = snap;
        setEditConfig(cfg);
        setEditDirty(false);
        setCategory('all');
        setEditMode(true);
      }

      async function handleEditPasswordSubmit(pw) {
        setEditAuthError('');
        sessionStorage.setItem('admin_token', pw);
        try {
          const cfg = await loadEditConfig();
          if (!cfg) {
            setEditAuthError('인증 실패');
            return;
          }
          beginEditSession(cfg);
          setShowEditPasswordModal(false);
        } catch (e) {
          setEditAuthError('서버 연결 실패');
          sessionStorage.removeItem('admin_token');
        }
      }

      function handleEditPasswordCancel() {
        setShowEditPasswordModal(false);
        setEditAuthError('');
      }

      function handleReorder(fromIdx, toIdx) {
        if (!editConfig) return;
        if (fromIdx === toIdx) return;
        if (fromIdx < 0 || toIdx < 0) return;
        if (fromIdx >= editConfig.groups.length || toIdx >= editConfig.groups.length) return;

        const newGroups = editConfig.groups.slice();
        const [moved] = newGroups.splice(fromIdx, 1);
        newGroups.splice(toIdx, 0, moved);
        // Recalculate gridPosition to match array order (mirrors AdminApp.moveGroup)
        const renumbered = newGroups.map((g, i) => ({ ...g, gridPosition: i }));
        const newConfig = { ...editConfig, groups: renumbered };

        setEditConfig(newConfig);
        setEditDirty(JSON.stringify(newConfig) !== editInitialSnapRef.current);
      }

      function handleEditCancel(toast) {
        if (editDirty) {
          setConfirmCancel(true);
        } else {
          exitEditMode();
        }
      }

      function exitEditMode() {
        setEditMode(false);
        setEditConfig(null);
        setEditDirty(false);
        editInitialSnapRef.current = null;
        setConfirmCancel(false);
      }

      async function handleEditSave(toast) {
        if (!editConfig || editSaving) return;
        setEditSaving(true);
        try {
          const res = await api('/api/config', { method: 'PUT', json: editConfig });
          if (res && res.error) {
            if (/unauthorized/i.test(res.error)) {
              sessionStorage.removeItem('admin_token');
              toast.error('인증 만료', '다시 로그인해주세요');
              setEditMode(false);
              setEditConfig(null);
              setEditDirty(false);
              editInitialSnapRef.current = null;
              setShowEditPasswordModal(true);
            } else {
              toast.error('저장 실패', res.error);
            }
            return;
          }
          // Success: reload public gallery, exit edit mode
          await new Promise((resolve) => {
            api('/api/gallery').then(data => {
              setGalleryData(data);
              resolve();
            }).catch(resolve);
          });
          setEditMode(false);
          setEditConfig(null);
          setEditDirty(false);
          editInitialSnapRef.current = null;
          toast.success('저장됨', '');
        } catch (e) {
          toast.error('저장 실패', e.message || '네트워크 오류');
        } finally {
          setEditSaving(false);
        }
      }

      function openLightbox(groupIndex, imageIndex) {
        setLightbox({ groupIndex, imageIndex });
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        setLightbox(null);
        document.body.style.overflow = '';
      }

      function navigateLightbox(groupIndex, imageIndex) {
        setLightbox({ groupIndex, imageIndex });
      }

      return (
        <ToastProvider>
        <div>
          <GalleryHeader
            categories={categories}
            activeCategory={category}
            onCategoryChange={setCategory}
            editMode={editMode}
            showEditBtn={showEditBtn}
            onEnterEdit={enterEditMode}
            theme={theme}
            toggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
          />

          {editMode && (
            <EditBarWithToast
              dirty={editDirty}
              saving={editSaving}
              onSave={handleEditSave}
              onCancel={handleEditCancel}
            />
          )}
          {confirmCancel && (
            <ConfirmDialog
              title="변경사항을 버릴까요?"
              message="저장하지 않은 변경사항이 사라집니다."
              confirmLabel="버리기"
              onConfirm={exitEditMode}
              onCancel={() => setConfirmCancel(false)}
            />
          )}

          {loading ? (
            <div className="loading-spinner">
              <div></div>
              <p className="pixel-font" style={{fontSize: '0.6rem', marginTop: '16px'}}>Loading...</p>
            </div>
          ) : (
            <MasonryGrid
              groups={filteredGroups}
              cloudName={cloudName}
              onItemClick={openLightbox}
              editMode={editMode}
              onReorder={handleReorder}
            />
          )}

          {lightbox && (
            <Lightbox
              groups={filteredGroups}
              cloudName={cloudName}
              groupIndex={lightbox.groupIndex}
              imageIndex={lightbox.imageIndex}
              onClose={closeLightbox}
              onNavigate={navigateLightbox}
            />
          )}

          {showPasswordModal && (
            <PasswordModal
              onSubmit={handlePasswordSubmit}
              onCancel={handlePasswordCancel}
              error={authError}
            />
          )}
          {showEditPasswordModal && (
            <PasswordModal
              onSubmit={handleEditPasswordSubmit}
              onCancel={handleEditPasswordCancel}
              error={editAuthError}
            />
          )}
        </div>
        </ToastProvider>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
